    function pillowCardHtml(s, d, t){
      var col=typeColors[s.type]||"#8A7E68";
      var stars="";
      for(var i=1;i<=5;i++){ stars+='<i class="ti ti-star'+(i<=s.rate?'-filled':'')+'" style="font-size:12px; color:'+(i<=s.rate?t.accent:t.muted)+';"></i>'; }
      var meta=[d.sleeps[s.sleep], d.shoulders[s.shoulder], (s.height?d.heights[s.height]:""), (s.firm?d.firms[s.firm]:"")].filter(Boolean).join(" ・ ");
      var noteHtml = s.note ? '<p style="font-size:12px; color:'+(dark?"#C9C0AE":"#5F5E5A")+'; margin:6px 0 0; line-height:1.5; padding:7px 10px; background:'+(dark?"#16140F":"#F4EFE6")+'; border-radius:8px;">「'+s.note+'」'+(s.share?' <span style="font-size:9px; color:'+t.accent+';">'+(d.sharedTag||"公開中")+'</span>':'')+'</p>' : '';
      return '<div style="display:flex; align-items:flex-start; gap:11px; padding:11px 0; border-top:0.5px solid '+t.cardBd+';">'+
          '<div style="width:3px; align-self:stretch; background:'+col+'; border-radius:2px;"></div>'+
          '<div style="flex:1;">'+
            '<p style="font-size:13px; color:'+t.txt+'; margin:0 0 3px; font-weight:500; line-height:1.4;">'+s.name+'</p>'+
            (meta?'<p style="font-size:11px; color:'+t.sub+'; margin:0 0 5px;">'+meta+'</p>':'')+
            '<div style="display:flex; align-items:center; gap:8px;"><div style="display:flex; gap:2px;">'+stars+'</div>'+
            (s.rate>=4?'<span style="font-size:9px; color:'+t.accent+'; background:'+(dark?"#2A2418":"#FBF3E0")+'; padding:2px 8px; border-radius:999px;">'+d.repeat+'</span>':'')+'</div>'+
            noteHtml+
          '</div></div>';
    }
    function renderGroups(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('typeGroups').innerHTML="";
      var types=TYPES[curKind];
      types.forEach(function(tp){
        var items=MYPILLOW.filter(function(s){ return s.kind===curKind && s.type===tp; });
        var isOpen=!!openTypes[tp];
        var col=typeColors[tp]||"#8A7E68";
        var wrap=document.createElement('div');
        wrap.style.cssText="background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:13px; overflow:hidden;";
        var head=document.createElement('button');
        head.style.cssText="width:100%; display:flex; align-items:center; justify-content:space-between; background:transparent; border:none; padding:13px 15px; cursor:pointer;";
        head.innerHTML='<div style="display:flex; align-items:center; gap:10px;">'+
            '<span style="width:8px; height:8px; border-radius:50%; background:'+col+';"></span>'+
            '<span style="font-size:13px; color:'+t.txt+'; font-weight:500;">'+(d.types[tp]||tp)+'</span>'+
            '<span style="font-size:11px; color:'+t.muted+';">'+items.length+(d.count||"")+'</span>'+
          '</div>'+
          '<i class="ti ti-chevron-'+(isOpen?"up":"down")+'" style="font-size:17px; color:'+t.muted+';"></i>';
        head.onclick=function(){ openTypes[tp]=!openTypes[tp]; renderGroups(); };
        wrap.appendChild(head);
        if(isOpen){
          var body=document.createElement('div');
          body.style.cssText="padding:0 15px 8px;";
          if(items.length){ body.innerHTML=items.map(function(s){ return pillowCardHtml(s,d,t); }).join(""); }
          else{ body.innerHTML='<p style="font-size:12px; color:'+t.muted+'; padding:10px 0 12px; border-top:0.5px solid '+t.cardBd+';">'+(d.empty||"")+'</p>'; }
          wrap.appendChild(body);
        }
        $('typeGroups').appendChild(wrap);
      });
    }
    function chipRow(containerId, dict, selKey){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var box=$(containerId); box.innerHTML="";
      Object.keys(dict).forEach(function(k){
        var on=(sel[selKey]===k);
        var chip=document.createElement('span');
        chip.style.cssText="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; "+(on?"background:"+(dark?"#2A2418":"#FBF3E0")+"; color:"+t.accent+"; border:1.5px solid "+t.accent+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";");
        chip.textContent=dict[k];
        chip.onclick=function(){ sel[selKey]=(sel[selKey]===k && (selKey==="height"||selKey==="firm"))?"":k; renderForm(); };
        box.appendChild(chip);
      });
    }
    function renderForm(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      // タイプ（現在のkindのタイプのみ）
      $('typeChips').innerHTML="";
      TYPES[curKind].forEach(function(k){
        var on=(sel.type===k);
        var chip=document.createElement('span');
        chip.style.cssText="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; "+(on?"background:"+(dark?"#2A2418":"#FBF3E0")+"; color:"+t.accent+"; border:1.5px solid "+t.accent+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";");
        chip.textContent=d.types[k]||k;
        chip.onclick=function(){ sel.type=k; renderForm(); };
        $('typeChips').appendChild(chip);
      });
      chipRow('sleepChips', d.sleeps, 'sleep');
      chipRow('shoulderChips', d.shoulders, 'shoulder');
      chipRow('heightChips', d.heights, 'height');
      chipRow('firmChips', d.firms, 'firm');
      $('rateStars').innerHTML="";
      for(var i=1;i<=5;i++){(function(i){
        var st=document.createElement('i');

        st.style.cssText="font-size:24px; color:"+(i<=sel.rate?t.accent:t.muted)+"; cursor:pointer;";
        st.onclick=function(){ sel.rate=i; renderForm(); };
        $('rateStars').appendChild(st);
      })(i);}
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('lead').textContent=d.lead; $('addLbl').textContent=d.add;
      $('normalLbl').textContent=d.normal; $('hugLbl').textContent=d.hug;

      renderGroups(); renderForm();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('lead').style.color=t.sub;
      var nOn=(curKind==="normal");
      $('normalBtn').style.background=nOn?t.accent:'transparent'; $('normalBtn').style.color=nOn?(dark?'#16140F':'#FFFFFF'):t.sub; $('normalBtn').style.border=nOn?'none':'0.5px solid '+t.cardBd;
      $('hugBtn').style.background=!nOn?t.accent:'transparent'; $('hugBtn').style.color=!nOn?(dark?'#16140F':'#FFFFFF'):t.sub; $('hugBtn').style.border=!nOn?'none':'0.5px solid '+t.cardBd;
      $('addBtn').style.borderColor= dark?"#3A352A":"#E0DACE"; $('addBtn').style.color=t.sub;
      $('addForm').querySelector('div').style.background=t.card; $('addForm').querySelector('div').style.borderColor=t.cardBd;
      $('formTtl').style.color=t.txt;
      document.querySelectorAll('.fLbl').forEach(function(el){ el.style.color=t.sub; });
      [$('nameBox'),$('noteBox')].forEach(function(b){ b.style.background=t.inputBg; b.style.borderColor=t.cardBd; b.style.color=t.muted; });
      $('shareRow').style.background=t.inputBg; $('shareRow').style.borderColor=t.cardBd;
      $('shareLbl').style.color= dark?"#C9C0AE":"#5F5E5A";
      var on=sel.share;
      $('shareToggle').style.background= on? t.accent : (dark?"#2A2620":"#E0DACE");
      $('shareKnob').style.left= on? "21px":"3px"; $('shareKnob').style.background= on?(dark?"#16140F":"#FFFFFF"):(dark?"#6E6555":"#B7A98F");
      $('saveBtn').style.background=t.accent; $('saveBtn').style.color= dark?"#16140F":"#FFFFFF";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderGroups(); renderForm();
    }
    $('normalBtn').onclick=function(){ curKind="normal"; sel.type=TYPES.normal[0]; openTypes={}; applyTheme(); };
    $('hugBtn').onclick=function(){ curKind="hug"; sel.type=TYPES.hug[0]; openTypes={}; applyTheme(); };
    $('addBtn').onclick=function(){ formOpen=!formOpen; $('addForm').style.display=formOpen?"block":"none"; };
    $('shareRow').onclick=function(){ sel.share=!sel.share; applyTheme(); };
    $('saveBtn').onclick=function(){ formOpen=false; $('addForm').style.display="none"; };
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
