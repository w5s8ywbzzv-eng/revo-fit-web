  <h2 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;">レシピを投稿。あなたのアイデアを分け合う。写真・料理名・タグ・材料・作り方・栄養・手間を入れる。タグは既存を提案して表記ゆれを防ぎ、新しく作ることもできる。言語と明暗を切り替えられる</h2>

  <div id="hdr" style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:0.5px solid #2A2620; transition:border-color 0.35s;">

    <p id="hdrTtl" style="font-size:16px; font-weight:500; color:#F0EBE2; margin:0; transition:color 0.35s;">レシピを投稿</p>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="langBtn" aria-label="言語" style="width:30px; height:30px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i class="ti ti-world" style="font-size:15px; color:#B0A488;" aria-hidden="true"></i></button>
      <button id="themeBtn" aria-label="明るさ" style="width:30px; height:30px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i id="themeIcon" class="ti ti-sun" style="font-size:15px; color:#E3C56A;" aria-hidden="true"></i></button>
      <button id="postBtn" style="background:#E3C56A; border:none; color:#16140F; font-size:13px; font-weight:600; padding:8px 16px; border-radius:999px; cursor:pointer;">投稿</button>
    </div>
    <div id="langMenu" style="display:none; position:absolute; top:50px; right:16px; width:206px; max-height:300px; overflow-y:auto; background:#1F1C16; border:0.5px solid #3A352A; border-radius:14px; padding:6px; box-shadow:0 18px 40px -12px rgba(0,0,0,0.7); z-index:30;"></div>
  </div>

  <div style="padding:18px 16px 0; max-height:600px; overflow-y:auto;">

    <!-- 写真 -->
    <p id="photoLbl" class="secLbl" style="font-size:12px; color:#A89C84; margin:0 0 8px; font-weight:500;">料理写真（あれば）</p>
    <div id="addPhoto" style="width:100%; height:120px; background:#1A1814; border:0.5px dashed #4A4232; border-radius:13px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; margin:0 0 20px;">
      <i class="ti ti-camera-plus" style="font-size:26px; color:#8A7E68;" aria-hidden="true"></i>
      <span id="photoHint" style="font-size:11px; color:#6E6555;">タップして写真を追加</span>
    </div>

    <!-- 料理名 -->
    <p id="nameLbl" class="secLbl" style="font-size:12px; color:#A89C84; margin:0 0 8px; font-weight:500;">料理名 <span class="req" style="color:#E0846A;">*</span></p>
    <input id="nameInput" type="text" placeholder="例：レンジ蒸し鶏のピリ辛だれ" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:11px; padding:12px 14px; font-size:14px; color:#F0EBE2; margin:0 0 20px; outline:none;">

    <!-- タグ -->
    <p id="tagLbl" class="secLbl" style="font-size:12px; color:#A89C84; margin:0 0 4px; font-weight:500;">タグ</p>
    <p id="tagHint" style="font-size:11px; color:#6E6555; margin:0 0 8px; line-height:1.5;">みんなが見つけやすくなります。入力すると候補が出ます。</p>

    <div id="selTags" style="display:flex; flex-wrap:wrap; gap:6px; margin:0 0 8px;"></div>
    <div style="position:relative; margin:0 0 20px;">
      <input id="tagInput" type="text" placeholder="例：宅トレ飯" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:11px; padding:12px 14px; font-size:14px; color:#F0EBE2; outline:none;">
      <div id="tagSuggest" style="display:none; position:absolute; left:0; right:0; margin-top:5px; background:#1F1C16; border:0.5px solid #3A352A; border-radius:12px; padding:6px; box-shadow:0 14px 34px -10px rgba(0,0,0,0.7); z-index:20; max-height:220px; overflow-y:auto;"></div>
    </div>

    <p id="stepLbl" class="secLbl" style="font-size:12px; color:#A89C84; margin:0 0 8px; font-weight:500;">作り方 <span class="req" style="color:#E0846A;">*</span></p>

    <!-- PFC＋カロリー -->
    <p id="pfcLbl" class="secLbl" style="font-size:12px; color:#A89C84; margin:0 0 8px; font-weight:500;">栄養（1食あたり）</p>

      <div class="pfcField"><span class="pfcCap" data-k="kcal" style="font-size:11px; color:#8A7E68;">カロリー</span><div style="display:flex; align-items:center; gap:5px; margin-top:4px;"><input class="pfcInput" data-k="kcal" type="number" placeholder="280" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:9px; padding:9px 11px; font-size:13px; color:#F0EBE2; outline:none;"><span class="pfcUnit" style="font-size:11px; color:#6E6555;">kcal</span></div></div>
      <div class="pfcField"><span class="pfcCap" data-k="p" style="font-size:11px; color:#8A7E68;">たんぱく質</span><div style="display:flex; align-items:center; gap:5px; margin-top:4px;"><input class="pfcInput" data-k="p" type="number" placeholder="32" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:9px; padding:9px 11px; font-size:13px; color:#F0EBE2; outline:none;"><span class="pfcUnit" style="font-size:11px; color:#6E6555;">g</span></div></div>
      <div class="pfcField"><span class="pfcCap" data-k="f" style="font-size:11px; color:#8A7E68;">脂質</span><div style="display:flex; align-items:center; gap:5px; margin-top:4px;"><input class="pfcInput" data-k="f" type="number" placeholder="8" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:9px; padding:9px 11px; font-size:13px; color:#F0EBE2; outline:none;"><span class="pfcUnit" style="font-size:11px; color:#6E6555;">g</span></div></div>
      <div class="pfcField"><span class="pfcCap" data-k="c" style="font-size:11px; color:#8A7E68;">炭水化物</span><div style="display:flex; align-items:center; gap:5px; margin-top:4px;"><input class="pfcInput" data-k="c" type="number" placeholder="14" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:9px; padding:9px 11px; font-size:13px; color:#F0EBE2; outline:none;"><span class="pfcUnit" style="font-size:11px; color:#6E6555;">g</span></div></div>

    <p id="effLbl" class="secLbl" style="font-size:12px; color:#A89C84; margin:0 0 8px; font-weight:500;">手間（あてはまるものを選ぶ）</p>

        tag:"Tags",tagHint:"Ajuda outros a encontrar. Digite para ver sugestões.",tagPh:"ex: homegym",
        tagUsed:"{n} vezes",tagNew:"Criar tag \"{t}\"",
        ing:"Ingredientes",addIng:"Adicionar ingrediente",ingNamePh:"Ingrediente",ingAmtPh:"Quantidade",
        step:"Modo de fazer",addStep:"Adicionar passo",stepPh:"Escreva um passo",
        pfc:"Nutrição (por porção)",pfcCap:{kcal:"Calorias",p:"Proteína",f:"Gordura",c:"Carboidratos"},
        eff:"Esforço (marque o que se aplica)",effs:{noKnife:"Sem faca",noBoard:"Sem tábua",lessWash:"Menos louça",micro:"Só micro-ondas"},
        scope:"Quem pode ver",scopeVal:"Todos"},
      "हिन्दी":{hdr:"रेसिपी पोस्ट करें",close:"बंद करें",post:"पोस्ट",
        photo:"व्यंजन फोटो (वैकल्पिक)",photoHint:"फोटो जोड़ने के लिए टैप करें",
        name:"व्यंजन का नाम",namePh:"जैसे: माइक्रोवेव चिकन",
        tag:"टैग",tagHint:"दूसरों को ढूँढने में आसानी। लिखने पर सुझाव आएँगे।",tagPh:"जैसे: होमजिम",
        tagUsed:"{n} बार",tagNew:"नया टैग \"{t}\" बनाएँ",
        ing:"सामग्री",addIng:"सामग्री जोड़ें",ingNamePh:"सामग्री",ingAmtPh:"मात्रा",
        step:"विधि",addStep:"चरण जोड़ें",stepPh:"चरण लिखें",
        pfc:"पोषण (प्रति सर्विंग)",pfcCap:{kcal:"कैलोरी",p:"प्रोटीन",f:"वसा",c:"कार्ब्स"},
        eff:"मेहनत (जो लागू हो चुनें)",effs:{noKnife:"बिना चाकू",noBoard:"बिना बोर्ड",lessWash:"कम बर्तन",micro:"सिर्फ माइक्रोवेव"},
        scope:"कौन देख सकता है",scopeVal:"सभी"},
      "Tiếng Việt":{hdr:"Đăng công thức",close:"Đóng",post:"Đăng",
        photo:"Ảnh món ăn (tùy chọn)",photoHint:"Chạm để thêm ảnh",
        name:"Tên món",namePh:"vd: Gà hấp lò vi sóng",
        tag:"Thẻ",tagHint:"Giúp người khác dễ tìm. Gõ để xem gợi ý.",tagPh:"vd: tậpnhà",
        tagUsed:"{n} lần",tagNew:"Tạo thẻ mới \"{t}\"",
        ing:"Nguyên liệu",addIng:"Thêm nguyên liệu",ingNamePh:"Nguyên liệu",ingAmtPh:"Số lượng",
        step:"Cách làm",addStep:"Thêm bước",stepPh:"Viết một bước",
        pfc:"Dinh dưỡng (mỗi phần)",pfcCap:{kcal:"Calo",p:"Đạm",f:"Béo",c:"Tinh bột"},
        eff:"Công sức (chọn cái phù hợp)",effs:{noKnife:"Không dao",noBoard:"Không thớt",lessWash:"Ít rửa",micro:"Chỉ lò vi sóng"},
        scope:"Ai có thể xem",scopeVal:"Mọi người"},
      "Bahasa Indonesia":{hdr:"Posting resep",close:"Tutup",post:"Posting",
        photo:"Foto masakan (opsional)",photoHint:"Ketuk untuk menambah foto",
        name:"Nama masakan",namePh:"mis: Ayam kukus microwave",
        tag:"Tag",tagHint:"Memudahkan orang menemukan. Ketik untuk melihat saran.",tagPh:"mis: gymrumah",
        tagUsed:"{n} kali",tagNew:"Buat tag baru \"{t}\"",
        ing:"Bahan",addIng:"Tambah bahan",ingNamePh:"Bahan",ingAmtPh:"Jumlah",
        step:"Cara membuat",addStep:"Tambah langkah",stepPh:"Tulis langkah",
        pfc:"Nutrisi (per porsi)",pfcCap:{kcal:"Kalori",p:"Protein",f:"Lemak",c:"Karbo"},
        eff:"Usaha (pilih yang sesuai)",effs:{noKnife:"Tanpa pisau",noBoard:"Tanpa talenan",lessWash:"Sedikit cucian",micro:"Microwave saja"},
        scope:"Siapa yang bisa lihat",scopeVal:"Semua"}
    };
    var cur="日本語", dark=true;
    var selectedTags=[]; // {key or newText}
    var ings=[{},{}]; // 材料行（初期2つ）
    var steps=[{},{}]; // 工程（初期2つ）
    var effState={noKnife:false,noBoard:false,lessWash:false,micro:false};
    var T={
      dark:{bg:"#16140F",txt:"#F0EBE2",sub:"#A89C84",muted:"#6E6555",field:"#1A1814",fieldBd:"#2A2620",chip:"#221E14",chipTx:"#D8C79A",menu:"#1F1C16",menuBd:"#3A352A",iconBg:"#1F1C16",iconBd:"#3A352A",iconCol:"#B0A488",accent:"#E3C56A"},
      light:{bg:"#FFFFFF",txt:"#2E2A24",sub:"#8A7E68",muted:"#B7A98F",field:"#FBF7F1",fieldBd:"#F0EAE0",chip:"#FBF3E0",chipTx:"#7A6A3E",menu:"#FFFFFF",menuBd:"#E8E0CE",iconBg:"#FFFFFF",iconBd:"#E8E0CE",iconCol:"#9A8E78",accent:"#BA7517"}
    };
    var $=function(id){return document.getElementById(id);};
    function tagLabel(key){ return (TAGS[key]&&(TAGS[key].label[cur]||TAGS[key].label["English"]))||key; }
    function renderSelTags(){
      var t=dark?T.dark:T.light;
      $('selTags').innerHTML="";
      selectedTags.forEach(function(tg,i){
        var lbl = tg.key ? tagLabel(tg.key) : tg.text;
        var chip=document.createElement('span');
        chip.style.cssText="display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:6px 10px; border-radius:999px; background:"+t.accent+"; color:"+(dark?"#16140F":"#FFFFFF")+"; font-weight:600;";
        chip.innerHTML='#'+lbl+'<i class="ti ti-x" style="font-size:13px; cursor:pointer;"></i>';
        chip.querySelector('i').onclick=function(){ selectedTags.splice(i,1); renderSelTags(); };
        $('selTags').appendChild(chip);
      });
    }
    function renderTagSuggest(q){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var box=$('tagSuggest');
      if(!q){ box.style.display="none"; return; }
      var ql=q.toLowerCase();
      // 既存タグから前方・部分一致（使用数順）。すでに選択済みは除外
      var selKeys=selectedTags.filter(function(x){return x.key;}).map(function(x){return x.key;});
      var matches=Object.keys(TAGS).filter(function(k){
        if(selKeys.indexOf(k)>=0) return false;
        var lbl=(TAGS[k].label[cur]||"")+ " "+(TAGS[k].label["English"]||"")+" "+k;
        return lbl.toLowerCase().indexOf(ql)>=0;
      }).sort(function(a,b){ return TAGS[b].count-TAGS[a].count; });
      box.innerHTML="";
      matches.forEach(function(k){
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:9px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<span style="font-size:13px; color:'+t.accent+';">#'+tagLabel(k)+'</span><span style="font-size:10px; color:'+t.muted+';">'+d.tagUsed.replace("{n}",TAGS[k].count.toLocaleString())+'</span>';
        row.onclick=function(){ selectedTags.push({key:k}); $('tagInput').value=""; renderSelTags(); box.style.display="none"; };
        box.appendChild(row);
      });
      // 完全一致がなければ「新規作成」
      var exact=matches.some(function(k){ return (TAGS[k].label[cur]||"").toLowerCase()===ql || k.toLowerCase()===ql; });
      if(!exact){
        var mk=document.createElement('div');
        mk.style.cssText="display:flex; align-items:center; gap:7px; padding:10px 12px; border-radius:9px; cursor:pointer; border-top:0.5px solid "+t.menuBd+"; margin-top:2px;";
        mk.onmouseenter=function(){ mk.style.background=dark?"#26231C":"#F4EFE6"; };
        mk.onmouseleave=function(){ mk.style.background="transparent"; };
        mk.innerHTML='<i class="ti ti-plus" style="font-size:15px; color:'+t.sub+';"></i><span style="font-size:13px; color:'+t.txt+';">'+d.tagNew.replace("{t}",q)+'</span>';
        mk.onclick=function(){ selectedTags.push({text:q}); $('tagInput').value=""; renderSelTags(); box.style.display="none"; };
        box.appendChild(mk);
      }
      box.style.display="block";
    }
    function renderIngs(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('ingList').innerHTML="";
      ings.forEach(function(ig,i){
        var row=document.createElement('div');
        row.style.cssText="display:flex; gap:8px; align-items:center;";
        row.innerHTML='<input type="text" placeholder="'+d.ingNamePh+'" value="'+(ig.name||"")+'" style="flex:2; box-sizing:border-box; background:'+t.field+'; border:0.5px solid '+t.fieldBd+'; border-radius:10px; padding:10px 12px; font-size:13px; color:'+t.txt+'; outline:none;">'+
          '<input type="text" placeholder="'+d.ingAmtPh+'" value="'+(ig.amt||"")+'" style="flex:1; box-sizing:border-box; background:'+t.field+'; border:0.5px solid '+t.fieldBd+'; border-radius:10px; padding:10px 12px; font-size:13px; color:'+t.txt+'; outline:none;">'+
          (ings.length>1?'<i class="ti ti-x" style="font-size:16px; color:'+t.muted+'; cursor:pointer; flex-shrink:0;"></i>':'<span style="width:16px; flex-shrink:0;"></span>');
        var inputs=row.querySelectorAll('input');
        inputs[0].oninput=function(){ ig.name=this.value; };
        inputs[1].oninput=function(){ ig.amt=this.value; };
        var x=row.querySelector('i.ti-x'); if(x) x.onclick=function(){ ings.splice(i,1); renderIngs(); };
        $('ingList').appendChild(row);
      });
    }
    function renderSteps(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('stepList').innerHTML="";
      steps.forEach(function(st,i){
        var row=document.createElement('div');
        row.style.cssText="display:flex; gap:9px; align-items:flex-start;";
        row.innerHTML='<div style="width:24px; height:24px; border-radius:50%; background:'+t.accent+'; color:'+(dark?"#16140F":"#FFFFFF")+'; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; margin-top:4px; font-family:Jost;">'+(i+1)+'</div>'+
          '<textarea placeholder="'+d.stepPh+'" rows="2" style="flex:1; box-sizing:border-box; background:'+t.field+'; border:0.5px solid '+t.fieldBd+'; border-radius:10px; padding:10px 12px; font-size:13px; color:'+t.txt+'; outline:none; resize:vertical; font-family:inherit;">'+(st.text||"")+'</textarea>'+
          (steps.length>1?'<i class="ti ti-x" style="font-size:16px; color:'+t.muted+'; cursor:pointer; flex-shrink:0; margin-top:8px;"></i>':'<span style="width:16px; flex-shrink:0;"></span>');
        row.querySelector('textarea').oninput=function(){ st.text=this.value; };
        var x=row.querySelector('i.ti-x'); if(x) x.onclick=function(){ steps.splice(i,1); renderSteps(); };
        $('stepList').appendChild(row);
      });
    }
    function renderEff(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('effWrap').innerHTML="";
      ["noKnife","noBoard","lessWash","micro"].forEach(function(k){
        var on=effState[k];
        var chip=document.createElement('span');
        chip.style.cssText="font-size:12px; padding:8px 13px; border-radius:999px; cursor:pointer; "+(on?"background:"+t.accent+"; color:"+(dark?"#16140F":"#FFFFFF")+"; font-weight:600;":"background:"+t.field+"; color:"+t.sub+"; border:0.5px solid "+t.fieldBd+";");
        chip.textContent=d.effs[k];
        chip.onclick=function(){ effState[k]=!effState[k]; renderEff(); };
        $('effWrap').appendChild(chip);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('closeTxt').textContent=d.close; $('postBtn').textContent=d.post;
      $('photoLbl').firstChild.textContent=d.photo; $('photoHint').textContent=d.photoHint;
      $('nameLbl').firstChild.textContent=d.name+" "; $('nameInput').placeholder=d.namePh;
      $('tagLbl').firstChild.textContent=d.tag; $('tagHint').textContent=d.tagHint; $('tagInput').placeholder=d.tagPh;
      $('ingLbl').firstChild.textContent=d.ing+" "; $('addIngLbl').textContent=d.addIng;
      $('stepLbl').firstChild.textContent=d.step+" "; $('addStepLbl').textContent=d.addStep;
      $('pfcLbl').textContent=d.pfc;
      document.querySelectorAll('.pfcCap').forEach(function(el){ el.textContent=d.pfcCap[el.getAttribute('data-k')]; });
      $('effLbl').textContent=d.eff;
      $('scopeLbl').textContent=d.scope; $('scopeVal').textContent=d.scopeVal;
      renderSelTags(); renderIngs(); renderSteps(); renderEff();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt; $('closeTxt').style.color=t.sub;
      document.querySelectorAll('.secLbl').forEach(function(el){ el.style.color=t.sub; });
      $('tagHint').style.color=t.muted;
      $('addPhoto').style.background=t.field; $('addPhoto').style.borderColor= dark?"#4A4232":"#D8CBB0";
      $('nameInput').style.background=t.field; $('nameInput').style.borderColor=t.fieldBd; $('nameInput').style.color=t.txt;
      $('tagInput').style.background=t.field; $('tagInput').style.borderColor=t.fieldBd; $('tagInput').style.color=t.txt;
      $('tagSuggest').style.background=t.menu; $('tagSuggest').style.borderColor=t.menuBd;
      $('addIng').style.borderColor= dark?"#3A352A":"#E0DACE"; $('addIng').style.color=t.sub;
      $('addStep').style.borderColor= dark?"#3A352A":"#E0DACE"; $('addStep').style.color=t.sub;
      document.querySelectorAll('.pfcInput').forEach(function(el){ el.style.background=t.field; el.style.borderColor=t.fieldBd; el.style.color=t.txt; });
      document.querySelectorAll('.pfcUnit').forEach(function(el){ el.style.color=t.muted; });
      $('scopeRow').style.background=t.field; $('scopeLbl').style.color=t.txt; $('scopeVal').style.color=t.sub;
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('postBtn').style.background=t.accent; $('postBtn').style.color= dark?"#16140F":"#FFFFFF";
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background=t.menu; $('langMenu').style.borderColor=t.menuBd;
      applyUI();
    }
    // イベント
    $('tagInput').oninput=function(){ renderTagSuggest(this.value.trim()); };
    $('tagInput').onkeydown=function(e){ if(e.key==="Enter"){ e.preventDefault(); var v=this.value.trim(); if(v){ selectedTags.push({text:v}); this.value=""; renderSelTags(); $('tagSuggest').style.display="none"; } } };
    $('addIng').onclick=function(){ ings.push({}); renderIngs(); };
    $('addStep').onclick=function(){ steps.push({}); renderSteps(); };
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(e){ $('langMenu').style.display="none"; if(!$('tagSuggest').contains(e.target) && e.target!==$('tagInput')) $('tagSuggest').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    $('tagInput').onclick=function(e){ e.stopPropagation(); };
    applyTheme();
  })();
</script>
</div>
