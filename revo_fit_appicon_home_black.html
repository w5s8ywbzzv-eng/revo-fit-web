<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<div style="background:#F1EFEA; border-radius:14px; padding:12px; display:flex; justify-content:center;">
<div id="screen" style="background:#16140F; border-radius:20px; font-family:var(--font-sans); max-width:390px; width:100%; margin:0 auto; overflow:hidden; position:relative; transition:background 0.5s;">

  <h2 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;">revo へようこそ、という入口の画面。金色に淡く輝く revo fit のアイコン、その下に revo in your life というタグラインと世界観のひとこと。始めるボタンと、すでにアカウントがある人向けのログイン。言語と明暗を切り替えられる。</h2>

  <!-- 右上：言語と明るさ（控えめ） -->
  <div style="display:flex; align-items:center; justify-content:flex-end; padding:16px 18px; gap:8px; position:relative; z-index:5;">
    <button id="langBtn" aria-label="言語" style="width:30px; height:30px; border-radius:50%; background:transparent; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.4s;"><i class="ti ti-world" style="font-size:15px; color:#8A7E68;"></i></button>
    <button id="themeBtn" aria-label="明るさ" style="width:30px; height:30px; border-radius:50%; background:transparent; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.4s;"><i id="themeIcon" class="ti ti-sun" style="font-size:15px; color:#8A7E68;"></i></button>
    <div id="langMenu" style="display:none; position:absolute; top:52px; right:18px; width:206px; max-height:300px; overflow-y:auto; background:#1F1C16; border:0.5px solid #3A352A; border-radius:14px; padding:6px; box-shadow:0 18px 40px -12px rgba(0,0,0,0.7); z-index:30;"></div>
  </div>

  <div style="padding:20px 34px 44px; text-align:center;">

    <!-- ワードマーク -->
    <div style="display:flex; justify-content:center; margin:52px 0 40px;">
      <span style="font-family:Jost; font-weight:100; font-size:54px; letter-spacing:0.02em; line-height:1;"><span id="wmRevo" style="color:#F0EBE2;">revo</span><span id="wmSuffix" style="color:#E3C56A; font-weight:200; margin-left:0.18em;">fit</span></span>
    </div>

    <!-- タグライン -->
    <p id="tagline" style="font-family:Jost; font-weight:300; font-size:19px; color:#E3C56A; margin:0 0 18px; letter-spacing:0.06em;">revo in your life</p>

    <!-- 世界観のひとこと -->
    <p id="lead" style="font-size:15px; color:#F0EBE2; margin:0 0 10px; font-weight:300; line-height:1.7; letter-spacing:0.01em;">あなたの毎日を、<br>動きで満たしていく。</p>
    <p id="sub" style="font-size:12px; color:#8A7E68; margin:0 0 46px; font-weight:300; line-height:1.8;">鍛える、生活、走る。<br>revo が、そのすべてのそばに。</p>

    <!-- 始める -->
    <button id="startBtn" style="width:100%; background:#E3C56A; border:none; color:#16140F; font-size:15px; font-weight:600; padding:16px; border-radius:13px; cursor:pointer; letter-spacing:0.02em; margin:0 0 14px;">はじめる</button>
    <!-- ログイン -->
    <button id="loginBtn" style="width:100%; background:transparent; border:0.5px solid #3A352A; color:#B0A488; font-size:14px; font-weight:500; padding:15px; border-radius:13px; cursor:pointer; letter-spacing:0.02em;">ログイン</button>

    <p id="tos" style="font-size:10px; color:#6E6555; margin:26px 0 0; line-height:1.7; font-weight:300;">続けることで、利用規約とプライバシーポリシーに同意したものとみなされます。</p>

  </div>

</div>
</div>
<script>
  (function(){
    var langs=["日本語","English","简体中文","繁體中文","한국어","Français","Español","Deutsch","Italiano","Português","ภาษาไทย","हिन्दी","Tiếng Việt","Bahasa Indonesia"];
    var langSub={"English":"英語","简体中文":"中国語（簡体）","繁體中文":"中国語（繁体）","한국어":"韓国語","Français":"フランス語","Español":"スペイン語","Deutsch":"ドイツ語","Italiano":"イタリア語","Português":"ポルトガル語","ภาษาไทย":"タイ語","हिन्दी":"ヒンディー語","Tiếng Việt":"ベトナム語","Bahasa Indonesia":"インドネシア語"};
    var cur="日本語", dark=true;
    var T={dark:{bg:"#16140F",title:"#F0EBE2",sub:"#8A7E68",muted:"#6E6555",accent:"#E3C56A",line:"#3A352A",loginTxt:"#B0A488",loginBd:"#3A352A"},
            light:{bg:"#FCFAF6",title:"#2E2A24",sub:"#8A7E68",muted:"#B7A98F",accent:"#BA7517",line:"#E0D6C4",loginTxt:"#7A7060",loginBd:"#E0D6C4"}};
    var D={
      "日本語":{tag:"revo in your life",lead:"あなたの毎日を、<br>動きで満たしていく。",sub:"鍛える、生活、走る。<br>revo が、そのすべてのそばに。",start:"はじめる",login:"ログイン",tos:"続けることで、利用規約とプライバシーポリシーに同意したものとみなされます。"},
      "English":{tag:"revo in your life",lead:"Fill your every day<br>with movement.",sub:"Train, life, run.<br>revo stays close to it all.",start:"Get started",login:"Log in",tos:"By continuing, you agree to the Terms and Privacy Policy."},
      "简体中文":{tag:"revo in your life",lead:"让运动，<br>充盈你的每一天。",sub:"锻炼、生活、跑步。<br>revo 陪伴这一切。",start:"开始",login:"登录",tos:"继续即表示你同意条款与隐私政策。"},
      "繁體中文":{tag:"revo in your life",lead:"讓運動，<br>充盈你的每一天。",sub:"鍛鍊、生活、跑步。<br>revo 陪伴這一切。",start:"開始",login:"登入",tos:"繼續即表示你同意條款與隱私政策。"},
      "한국어":{tag:"revo in your life",lead:"당신의 매일을<br>움직임으로 채워요.",sub:"단련하기, 생활, 달리기.<br>revo가 그 곁에 있어요.",start:"시작하기",login:"로그인",tos:"계속하면 약관과 개인정보 정책에 동의한 것으로 간주돼요."},
      "Français":{tag:"revo in your life",lead:"Remplissez chaque jour<br>de mouvement.",sub:"Entraînement, vie, course.<br>revo reste tout près.",start:"Commencer",login:"Se connecter",tos:"En continuant, vous acceptez les CGU et la politique de confidentialité."},
      "Español":{tag:"revo in your life",lead:"Llena tu día a día<br>de movimiento.",sub:"Entrenamiento, vida, carrera.<br>revo está cerca de todo.",start:"Empezar",login:"Iniciar sesión",tos:"Al continuar, aceptas los Términos y la Política de privacidad."},
      "Deutsch":{tag:"revo in your life",lead:"Füll deinen Alltag<br>mit Bewegung.",sub:"Training, Leben, Lauf.<br>revo bleibt ganz nah.",start:"Loslegen",login:"Anmelden",tos:"Mit dem Fortfahren stimmst du den AGB und der Datenschutzerklärung zu."},
      "Italiano":{tag:"revo in your life",lead:"Riempi ogni giorno<br>di movimento.",sub:"Allenamento, vita, corsa.<br>revo è vicino a tutto.",start:"Inizia",login:"Accedi",tos:"Continuando, accetti i Termini e la Privacy."},
      "Português":{tag:"revo in your life",lead:"Preencha cada dia<br>com movimento.",sub:"Treino, vida, corrida.<br>revo fica perto de tudo.",start:"Começar",login:"Entrar",tos:"Ao continuar, você aceita os Termos e a Política de Privacidade."},
      "ภาษาไทย":{tag:"revo in your life",lead:"เติมทุกวันของคุณ<br>ด้วยการเคลื่อนไหว",sub:"การฝึก ชีวิต การวิ่ง<br>revo อยู่ใกล้ทุกสิ่ง",start:"เริ่มต้น",login:"เข้าสู่ระบบ",tos:"การดำเนินต่อถือว่าคุณยอมรับข้อกำหนดและนโยบายความเป็นส่วนตัว"},
      "हिन्दी":{tag:"revo in your life",lead:"अपने हर दिन को<br>गति से भरें।",sub:"प्रशिक्षण, जीवन, दौड़।<br>revo हर पल साथ।",start:"शुरू करें",login:"लॉग इन",tos:"जारी रखने पर आप शर्तें और गोपनीयता नीति स्वीकार करते हैं।"},
      "Tiếng Việt":{tag:"revo in your life",lead:"Lấp đầy mỗi ngày<br>bằng chuyển động.",sub:"Luyện tập, cuộc sống, chạy bộ.<br>revo luôn ở bên.",start:"Bắt đầu",login:"Đăng nhập",tos:"Tiếp tục nghĩa là bạn đồng ý với Điều khoản và Chính sách bảo mật."},
      "Bahasa Indonesia":{tag:"revo in your life",lead:"Isi setiap harimu<br>dengan gerak.",sub:"Latihan, hidup, lari.<br>revo dekat dengan semua.",start:"Mulai",login:"Masuk",tos:"Dengan melanjutkan, kamu menyetujui Ketentuan dan Kebijakan Privasi."}
    };
    var $=function(id){return document.getElementById(id);};
    function applyLang(){
      var d=D[cur]||D["English"];
      $('tagline').textContent=d.tag; $('lead').innerHTML=d.lead; $('sub').innerHTML=d.sub;
      $('startBtn').textContent=d.start; $('loginBtn').textContent=d.login; $('tos').textContent=d.tos;
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('tagline').style.color=t.accent;
      $('wmSuffix').style.color=t.accent;
      $('wmRevo').style.color= dark?t.title:"#5A5F66";
      $('lead').style.color=t.title; $('sub').style.color=t.sub;
      $('startBtn').style.background=t.accent; $('startBtn').style.color= dark?"#16140F":"#FFFFFF";
      $('loginBtn').style.color=t.loginTxt; $('loginBtn').style.borderColor=t.loginBd;
      $('tos').style.color=t.muted;
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.borderColor=t.line; });
      $('langBtn').querySelector('i').style.color=t.sub;
      $('themeIcon').className= dark?"ti ti-sun":"ti ti-moon"; $('themeIcon').style.color=t.sub;
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.line;
      applyLang();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyTheme();
  })();
</script>
</div>
