    function suppCardHtml(s, d, t){
      var col=catColors[s.cat]||"#8A7E68";
      var stars="";
      for(var i=1;i<=5;i++){ stars+='<i class="ti ti-star'+(i<=s.rate?'-filled':'')+'" style="font-size:12px; color:'+(i<=s.rate?t.accent:t.muted)+';"></i>'; }

      return '<div style="display:flex; align-items:flex-start; gap:11px; padding:11px 0; border-top:0.5px solid '+t.cardBd+';">'+
          '<div style="width:3px; align-self:stretch; background:'+col+'; border-radius:2px;"></div>'+
          '<div style="flex:1;">'+
            '<p style="font-size:13px; color:'+t.txt+'; margin:0 0 3px; font-weight:500; line-height:1.4;">'+s.name+'</p>'+
            (sub?'<p style="font-size:11px; color:'+t.sub+'; margin:0 0 5px;">'+sub+'</p>':'')+
            '<div style="display:flex; align-items:center; gap:8px;"><div style="display:flex; gap:2px;">'+stars+'</div>'+

            noteHtml+
          '</div></div>';

    function renderGroups(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('catGroups').innerHTML="";
      var cats=GROUPS[curLevel];
      cats.forEach(function(cat){
        var items=MYSUPP.filter(function(s){ return s.cat===cat; });
        var isOpen=!!openCats[cat];
        var col=catColors[cat]||"#8A7E68";
        var wrap=document.createElement('div');
        wrap.style.cssText="background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:13px; overflow:hidden;";
        // ヘッダー（プルダウン）
        var head=document.createElement('button');
        head.style.cssText="width:100%; display:flex; align-items:center; justify-content:space-between; background:transparent; border:none; padding:13px 15px; cursor:pointer;";
        head.innerHTML='<div style="display:flex; align-items:center; gap:10px;">'+
            '<span style="width:8px; height:8px; border-radius:50%; background:'+col+';"></span>'+
            '<span style="font-size:13px; color:'+t.txt+'; font-weight:500;">'+(d.cats[cat]||cat)+'</span>'+
            '<span style="font-size:11px; color:'+t.muted+';">'+items.length+(d.count||"")+'</span>'+
          '</div>'+
          '<i class="ti ti-chevron-'+(isOpen?"up":"down")+'" style="font-size:17px; color:'+t.muted+';"></i>';
        head.onclick=function(){ openCats[cat]=!openCats[cat]; renderGroups(); };
        wrap.appendChild(head);
        // 中身
        if(isOpen){
          var body=document.createElement('div');
          body.style.cssText="padding:0 15px 8px;";
          if(items.length){ body.innerHTML=items.map(function(s){ return suppCardHtml(s,d,t); }).join(""); }
          else{ body.innerHTML='<p style="font-size:12px; color:'+t.muted+'; padding:10px 0 12px; border-top:0.5px solid '+t.cardBd+';">'+(d.empty||"")+'</p>'; }
          wrap.appendChild(body);
        }
        $('catGroups').appendChild(wrap);
      });
    }
    function renderForm(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      // カテゴリチップ
      $('catChips').innerHTML="";
      Object.keys(d.cats).forEach(function(k){
        var on=(sel.cat===k);
        var chip=document.createElement('span');
        chip.style.cssText="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; "+(on?"background:"+(dark?"#2A2418":"#FBF3E0")+"; color:"+t.accent+"; border:1.5px solid "+t.accent+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";");

        chip.onclick=function(){ sel.cat=k; renderForm(); };
        $('catChips').appendChild(chip);
      });
      // 形状チップ
      $('formChips').innerHTML="";

        var on=(sel.form===k);

        chip.textContent=d.forms[k];
        chip.onclick=function(){ sel.form=k; renderForm(); };
        $('formChips').appendChild(chip);

      // 評価スター
      $('rateStars').innerHTML="";

        var st=document.createElement('i');

      var d=D[cur]||D["English"];

    function applyTheme(){
      var t=dark?T.dark:T.light;

      [$('nameBox'),$('flavorBox'),$('noteBox')].forEach(function(b){ b.style.background=t.inputBg; b.style.borderColor=t.cardBd; b.style.color=t.muted; });

      $('shareLbl').style.color= dark?"#C9C0AE":"#5F5E5A";

      $('shareToggle').style.background= on? t.accent : (dark?"#2A2620":"#E0DACE");

    }

    $('addBtn').onclick=function(){ formOpen=!formOpen; $('addForm').style.display=formOpen?"block":"none"; };

      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";

        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');

    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
  })();
