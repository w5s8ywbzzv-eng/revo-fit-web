        f:{all:"Todos",quick:"Rápido",noknife:"Sem faca",lesswash:"Menos louça",micro:"Só micro-ondas",highp:"Rico em proteína",lowcal:"Baixa caloria",bulk:"Para volume",chicken:"Peito de frango",egg:"Ovo",oat:"Aveia",tofu:"Tofu"},grp:{effort:"Esforço",goal:"Objetivo",ing:"Ingrediente",tag:"Tags populares"},
        names:{r1:"Frango na micro-ondas, molho picante",r2:"Mingau proteico de ovo",r3:"Risoto salgado de aveia",r4:"Bowl de tofu esfarelado picante",r5:"Bowl burrito sem enrolar",r6:"Curry de tofu e grão-de-bico"},
        badge:{micro:"Micro-ondas {n}min",min:"{n} min",noKnife:"Sem faca",noBoard:"Sem tábua",lessWash:"Menos louça"},
        protein:"{n}g de proteína",kcal:"{n} kcal",react:"{n} acharam útil"},
      "हिन्दी":{hdr:"मसल फूड",lead:"वही खाना बोरिंग लगे? दुनिया भर के ट्रेनी खाने से, आज का एक कटोरा।",post:"अपना आइडिया पोस्ट करें",
        f:{all:"सभी",quick:"झटपट",noknife:"बिना चाकू",lesswash:"कम बर्तन",micro:"सिर्फ माइक्रोवेव",highp:"हाई प्रोटीन",lowcal:"लो कैलोरी",bulk:"बल्क के लिए",chicken:"चिकन ब्रेस्ट",egg:"अंडा",oat:"ओट्स",tofu:"टोफू"},grp:{effort:"मेहनत",goal:"लक्ष्य",ing:"सामग्री",tag:"लोकप्रिय टैग"},
        names:{r1:"माइक्रोवेव चिकन, तीखी चटनी",r2:"मुलायम अंडा प्रोटीन दलिया",r3:"नमकीन ओट्स रिसोतो",r4:"तीखा टोफू भुरजी बाउल",r5:"बिना लपेटे बुरिटो बाउल",r6:"टोफू छोले करी"},
        badge:{micro:"माइक्रोवेव {n}मिनट",min:"{n} मिनट",noKnife:"बिना चाकू",noBoard:"बिना बोर्ड",lessWash:"कम बर्तन"},
        protein:"प्रोटीन {n}g",kcal:"{n} कैलोरी",react:"{n} को उपयोगी लगा"},
      "Tiếng Việt":{hdr:"Món cơ bắp",lead:"Chán món cũ? Món hôm nay, từ bữa ăn của người tập khắp thế giới.",post:"Đăng ý tưởng của bạn",
        f:{all:"Tất cả",quick:"Nhanh",noknife:"Không dao",lesswash:"Ít rửa",micro:"Chỉ lò vi sóng",highp:"Nhiều đạm",lowcal:"Ít calo",bulk:"Để tăng cơ",chicken:"Ức gà",egg:"Trứng",oat:"Yến mạch",tofu:"Đậu phụ"},grp:{effort:"Công sức",goal:"Mục tiêu",ing:"Nguyên liệu",tag:"Thẻ phổ biến"},
        names:{r1:"Gà hấp lò vi sóng, sốt cay",r2:"Cháo trứng giàu đạm",r3:"Risotto yến mạch mặn",r4:"Cơm đậu phụ băm cay",r5:"Bát burrito không cuốn",r6:"Cà ri đậu phụ & đậu gà"},
        badge:{micro:"Lò vi sóng {n}phút",min:"{n} phút",noKnife:"Không dao",noBoard:"Không thớt",lessWash:"Ít rửa"},
        protein:"{n}g đạm",kcal:"{n} kcal",react:"{n} thấy hữu ích"},
      "Bahasa Indonesia":{hdr:"Menu otot",lead:"Bosan makanan yang itu-itu? Hidangan hari ini, dari menu para trainee sedunia.",post:"Posting idemu",
        f:{all:"Semua",quick:"Cepat",noknife:"Tanpa pisau",lesswash:"Sedikit cucian",micro:"Microwave saja",highp:"Tinggi protein",lowcal:"Rendah kalori",bulk:"Untuk bulking",chicken:"Dada ayam",egg:"Telur",oat:"Oatmeal",tofu:"Tahu"},grp:{effort:"Usaha",goal:"Tujuan",ing:"Bahan",tag:"Tag populer"},
        names:{r1:"Ayam kukus microwave, saus pedas",r2:"Bubur telur protein lembut",r3:"Risotto oat gurih",r4:"Bowl tahu cincang pedas",r5:"Bowl burrito tanpa gulung",r6:"Kari tahu & buncis kacang"},
        badge:{micro:"Microwave {n}mnt",min:"{n} mnt",noKnife:"Tanpa pisau",noBoard:"Tanpa talenan",lessWash:"Sedikit cucian"},
        protein:"{n}g protein",kcal:"{n} kkal",react:"{n} merasa berguna"}
    };
    var cur="日本語", dark=true, activeFilter="all";
    var recipeGrad=["#2A2418","#1F2420","#26221C","#222630","#2A2224","#1F2624"];
    var T={
      dark:{bg:"#16140F",txt:"#F0EBE2",sub:"#8A7E68",muted:"#6E6555",card:"#1A1814",cardBd:"#2A2620",chip:"#1F1C16",chipBd:"#3A352A",chipTx:"#A89C84",badgeBg:"#221E14",badgeTx:"#D8C79A",iconBg:"#1F1C16",iconBd:"#3A352A",iconCol:"#B0A488",accent:"#E3C56A"},
      light:{bg:"#FFFFFF",txt:"#2E2A24",sub:"#8A7E68",muted:"#B7A98F",card:"#FBF7F1",cardBd:"#F0EAE0",chip:"#FFFFFF",chipBd:"#E0DACE",chipTx:"#5F5E5A",badgeBg:"#FBF3E0",badgeTx:"#7A6A3E",iconBg:"#FFFFFF",iconBd:"#E8E0CE",iconCol:"#9A8E78",accent:"#BA7517"}
    };
    var $=function(id){return document.getElementById(id);};
    function matchFilter(r){
      var f=activeFilter;
      if(f==="all") return true;
      if(f.indexOf("tag_")===0){ var tk=f.slice(4); return (r.tags||[]).indexOf(tk)>=0; }
      if(f==="noknife") return r.noKnife;
      if(f==="lesswash") return r.lessWash;
      if(f==="micro") return r.micro;
      if(["chicken","egg","oat","tofu"].indexOf(f)>=0) return r.ing===f;
      return r.goals.indexOf(f)>=0; // highp/lowcal/bulk/quick
    }
    function filterLabel(k){
      var d=D[cur]||D["English"];
      if(k.indexOf("tag_")===0){ var tk=k.slice(4); return (TAGS[tk]&&TAGS[tk].label[cur])||(TAGS[tk]&&TAGS[tk].label["English"])||tk; }
      return d.f[k];
    }
    function renderFilters(){
      $('filterVal').textContent=filterLabel(activeFilter);
    }
    function renderFilterMenu(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var acc= dark?"#E3C56A":"#BA7517", titleCol=t.txt;
      $('filterMenu').innerHTML="";
      // すべて
      function addRow(k){
        var on=(activeFilter===k);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<span style="font-size:13px; color:'+(on?acc:titleCol)+'; font-weight:'+(on?"500":"400")+';">'+d.f[k]+'</span>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(e){ e.stopPropagation(); activeFilter=k; $('filterMenu').style.display="none"; $('filterChev').className="ti ti-chevron-down"; renderFilters(); renderRecipes(); };
        $('filterMenu').appendChild(row);
      }
      function addHeader(txt){
        var h=document.createElement('p');
        h.style.cssText="font-size:10px; color:"+t.muted+"; margin:10px 12px 4px; letter-spacing:0.05em; text-transform:uppercase;";
        h.textContent=txt;
        $('filterMenu').appendChild(h);
      }
      addRow("all");
      addHeader(d.grp.effort); ["noknife","lesswash","micro"].forEach(addRow);
      addHeader(d.grp.goal); ["quick","highp","lowcal","bulk"].forEach(addRow);
      addHeader(d.grp.ing); ["chicken","egg","oat","tofu"].forEach(addRow);
      // 人気タグ（ユーザー生成・使用数順に育つ）
      function addTagRow(tk){
        var on=(activeFilter==="tag_"+tk);
        var lbl=(TAGS[tk].label[cur])||(TAGS[tk].label["English"]);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<span style="display:flex; align-items:center; gap:8px;"><span style="font-size:13px; color:'+(on?acc:t.accent)+'; font-weight:'+(on?"500":"400")+';">'+lbl+'</span><span style="font-size:10px; color:'+t.muted+';">'+TAGS[tk].count.toLocaleString()+'</span></span>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(e){ e.stopPropagation(); activeFilter="tag_"+tk; $('filterMenu').style.display="none"; $('filterChev').className="ti ti-chevron-down"; renderFilters(); renderRecipes(); };
        $('filterMenu').appendChild(row);
      }
      var tagKeys=Object.keys(TAGS).sort(function(a,b){ return TAGS[b].count-TAGS[a].count; });
      addHeader(d.grp.tag); tagKeys.forEach(addTagRow);
    }
    function badge(txt, ic, t, strong){
      return '<span style="display:inline-flex; align-items:center; gap:3px; font-size:10px; padding:3px 8px; border-radius:999px; background:'+(strong?t.accent:t.badgeBg)+'; color:'+(strong?(dark?"#16140F":"#FFFFFF"):t.badgeTx)+'; font-weight:'+(strong?"600":"400")+';">'+(ic?'<i class="ti '+ic+'" style="font-size:11px;"></i>':'')+txt+'</span>';
    }
    function renderRecipes(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('recipeList').innerHTML="";
      var shown=RECIPES.filter(matchFilter);
      shown.forEach(function(r,idx){
        var card=document.createElement('div');
        card.style.cssText="background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:16px; overflow:hidden; cursor:pointer;";
        // サムネ（グラデ＋国旗＋料理名頭文字の代わりに絵文字皿）
        var thumb='<div style="height:96px; background:linear-gradient(135deg,'+recipeGrad[idx%recipeGrad.length]+',#16140F); display:flex; align-items:center; justify-content:space-between; padding:0 16px; position:relative;">'+
          '<span style="font-size:34px;">'+r.flag+'</span>'+
          '<div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">'+
            badge((r.micro?d.badge.micro:d.badge.min).replace("{n}",r.time), "ti-clock", t, true)+
          '</div></div>';
        // 手間バッジ
        var effort="";
        if(r.noKnife) effort+=badge(d.badge.noKnife,"ti-check",t);
        if(r.noBoard) effort+=badge(d.badge.noBoard,"",t);
        if(r.lessWash) effort+=badge(d.badge.lessWash,"ti-droplet",t);
        var body='<div style="padding:13px 15px;">'+
          '<p style="font-size:14px; color:'+t.txt+'; margin:0 0 8px; font-weight:600; line-height:1.4;">'+d.names[r.key]+'</p>'+
          '<div style="display:flex; flex-wrap:wrap; gap:5px; margin:0 0 10px;">'+effort+'</div>'+
          '<div style="display:flex; align-items:center; justify-content:space-between;">'+
            '<div style="display:flex; align-items:center; gap:10px;">'+
              '<span style="font-size:12px; color:'+t.accent+'; font-weight:600;">'+d.protein.replace("{n}",r.p)+'</span>'+
              '<span style="font-size:11px; color:'+t.sub+';">'+d.kcal.replace("{n}",r.kcal)+'</span>'+
            '</div>'+
            '<span style="font-size:10px; color:'+t.muted+';">'+d.react.replace("{n}",r.react.toLocaleString())+'</span>'+
          '</div></div>';
        card.innerHTML=thumb+body;
        $('recipeList').appendChild(card);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('lead').textContent=d.lead; $('postLbl').textContent=d.post;
      renderFilters(); renderRecipes();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('lead').style.color=t.sub;
      $('postBtn').style.borderColor= dark?"#3A352A":"#E0DACE"; $('postBtn').style.color=t.sub;
      $('filterSelect').style.background=t.card; $('filterSelect').style.borderColor=t.cardBd;
      $('filterVal').style.color=t.txt;
      $('filterMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('filterMenu').style.borderColor= dark?"#3A352A":"#E8E0CE";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderFilters(); renderRecipes();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('filterSelect').onclick=function(e){ e.stopPropagation(); var open=($('filterMenu').style.display==="block"); if(open){ $('filterMenu').style.display="none"; $('filterChev').className="ti ti-chevron-down"; } else { renderFilterMenu(); $('filterMenu').style.display="block"; $('filterChev').className="ti ti-chevron-up"; $('langMenu').style.display="none"; } };
    $('filterMenu').onclick=function(e){ e.stopPropagation(); };
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; $('filterMenu').style.display="none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; $('filterMenu').style.display="none"; $('filterChev').className="ti ti-chevron-down"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
  })();
</script>
</div>
