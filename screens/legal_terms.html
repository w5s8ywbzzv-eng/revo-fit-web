          health:["ข้อจำกัดความรับผิดด้านสุขภาพ","บริการนี้มีไว้เพื่อรักษาและส่งเสริมสุขภาพ ไม่ได้มีวัตถุประสงค์เพื่อการรักษาพยาบาล การวินิจฉัย หรือการรักษาโรค ตัวเลขและคำแนะนำที่แสดงเป็นเพียงค่าประมาณ ไม่รับประกันผลทางการแพทย์หรือความแม่นยำ หากกังวลเรื่องสุขภาพ มีโรคประจำตัว หรืออยู่ระหว่างการรักษา โปรดปรึกษาแพทย์หรือผู้เชี่ยวชาญเสมอ"],
          liability:["ขอบเขตความรับผิด","บริการพยายามให้บริการอย่างเสถียรที่สุด แต่อาจมีการหยุดชะงักหรือข้อผิดพลาด เราจำกัดความรับผิดในขอบเขตที่กฎหมายอนุญาต"],
          changes:["การเปลี่ยนแปลงข้อกำหนด","หากเปลี่ยนข้อกำหนดนี้ เราจะแจ้งในแอป การใช้ต่อหลังเปลี่ยนถือว่ายอมรับการเปลี่ยนแปลง"]}},
      "Français":{hdr:"Conditions d'utilisation",

          health:["Aviso de salud","El Servicio busca apoyar el mantenimiento y la mejora de la salud, y no está destinado a actos médicos, diagnóstico ni tratamiento. Las cifras y sugerencias son estimaciones y no garantizan ningún efecto médico ni exactitud. Si tienes dudas de salud, una enfermedad o estás en tratamiento, consulta siempre a un médico o profesional."],

      "Deutsch":{hdr:"Nutzungsbedingungen",
        intro:"Diese Bedingungen regeln die Nutzung von revo (dem „Dienst“). Bitte lies sie, bevor du beginnst.",

          health:["Gesundheitshinweis","Der Dienst dient der Erhaltung und Förderung der Gesundheit und ist nicht für medizinische Behandlung, Diagnose oder Therapie bestimmt. Die gezeigten Zahlen und Vorschläge sind Schätzungen und garantieren keine medizinische Wirkung oder Genauigkeit. Bei gesundheitlichen Bedenken, Vorerkrankungen oder laufender Behandlung konsultiere immer einen Arzt oder eine Fachperson."],
          liability:["Haftungsbeschränkung","Wir bemühen uns um einen möglichst stabilen Dienst, aber Unterbrechungen oder Fehler können auftreten. Wir beschränken unsere Haftung im gesetzlich zulässigen Rahmen."],
          changes:["Änderungen","Falls wir diese Bedingungen ändern, informieren wir dich in der App. Weitere Nutzung nach Änderungen gilt als Zustimmung."]}},
      "Italiano":{hdr:"Termini d'uso",

        s:{agree:["Accettazione","Usando il Servizio, si considera che tu abbia accettato questi termini. Se non sei d'accordo, astieniti dall'usarlo."],

          fee:["Costi e disdetta","I prezzi dei piani a pagamento sono mostrati sulla pagina di ciascun piano. Puoi disdire quando vuoi e usarlo fino a fine periodo. Data la natura del contenuto digitale, di norma nessun rimborso dopo l'acquisto."],
          content:["Post e contenuti","I diritti sui dati, ricette e commenti che pubblichi appartengono a te. Il Servizio può usarli nella misura necessaria per fornire e migliorare il servizio."],
          support:["Sostegno (mance)","Il sostegno è un modo per supportare i creator. Una parte dell'importo ricevuto è trattenuta come commissione. Vedi la pagina contatti o info per i dettagli."],

          health:["Avviso sulla salute","Il Servizio è pensato per sostenere il mantenimento e il miglioramento della salute e non è destinato ad atti medici, diagnosi o trattamenti. I numeri e i suggerimenti sono stime e non garantiscono alcun effetto medico o accuratezza. In caso di dubbi sulla salute, patologie o cure in corso, consulta sempre un medico o un professionista."],

          changes:["Modifiche","Se modifichiamo questi termini, te lo comunicheremo nell'app. L'uso continuato dopo le modifiche è considerato accettazione."]}},

          content:["Posts e conteúdo","Os direitos sobre os registros, receitas e comentários que você posta pertencem a você. O Serviço pode usá-los na medida necessária para fornecer e melhorar o serviço."],

      "हिन्दी":{hdr:"उपयोग की शर्तें",
        intro:"ये शर्तें revo (आगे \"सेवा\") के उपयोग की शर्तें तय करती हैं। शुरू करने से पहले पढ़ें।",
        updated:"अंतिम अपडेट: तैयारी में",note:"※ यह मुख्य बिंदुओं का सारांश है। पूर्ण पाठ आधिकारिक रिलीज़ से पहले प्रकाशित होगा।",
        contactLbl:"संपर्क",
        s:{agree:["शर्तों की स्वीकृति","सेवा का उपयोग करने पर माना जाएगा कि आपने इन शर्तों को स्वीकार किया। सहमत न हों तो उपयोग न करें।"],
          account:["खाता","सटीक जानकारी से पंजीकरण करें। खाते का प्रबंधन आपकी ज़िम्मेदारी है। अनधिकृत उपयोग दिखे तो संपर्क करें।"],
          fee:["शुल्क और रद्दीकरण","भुगतान प्लान के शुल्क प्रत्येक प्लान पृष्ठ पर दिखते हैं। सदस्यता कभी भी रद्द करें, रद्द के बाद अवधि के अंत तक उपयोग करें। नई खरीद 14 दिनों में रिफंड योग्य; उसके बाद और नवीनीकरण पर रिफंड नहीं।"],
          content:["पोस्ट और सामग्री","आपके द्वारा पोस्ट किए रिकॉर्ड, रेसिपी, टिप्पणियों के अधिकार आपके हैं। सेवा इन्हें सेवा प्रदान और सुधार हेतु आवश्यक सीमा में उपयोग कर सकती है।"],
          support:["सहयोग (टिप)","सहयोग क्रिएटर को सहारा देने का तरीका है। प्राप्त राशि का एक हिस्सा शुल्क के रूप में लिया जाता है। विवरण संपर्क या जानकारी पृष्ठ पर देखें।"],
          prohibited:["निषिद्ध कार्य","अवैध कार्य, दूसरों को नुकसान पहुँचाने वाले कार्य, झूठी जानकारी पोस्ट करना, या सेवा संचालन में बाधा डालने वाले कार्य से बचें।"],
          health:["स्वास्थ्य अस्वीकरण","यह सेवा स्वास्थ्य के रखरखाव और संवर्धन के लिए है, चिकित्सा कार्य, निदान या उपचार के लिए नहीं। दिखाई गई संख्याएँ और सुझाव केवल अनुमान हैं और किसी चिकित्सीय प्रभाव या सटीकता की गारंटी नहीं देते। स्वास्थ्य चिंता, किसी रोग या उपचाराधीन होने पर हमेशा डॉक्टर या विशेषज्ञ से सलाह लें।"],
          liability:["ज़िम्मेदारी की सीमा","हम यथासंभव स्थिर सेवा देने का प्रयास करते हैं, पर रुकावट या खराबी हो सकती है। कानून द्वारा अनुमत सीमा में हम ज़िम्मेदारी सीमित करते हैं।"],
          changes:["शर्तों में बदलाव","इन शर्तों में बदलाव पर ऐप में सूचित करेंगे। बदलाव के बाद उपयोग जारी रखना स्वीकृति माना जाएगा।"]}},
      "Tiếng Việt":{hdr:"Điều khoản sử dụng",
        intro:"Các điều khoản này quy định điều kiện sử dụng revo (\"Dịch vụ\"). Vui lòng đọc trước khi bắt đầu.",
        updated:"Cập nhật lần cuối: Đang chuẩn bị",note:"※ Đây là bản tóm tắt các điểm chính. Toàn văn sẽ được đăng trước khi ra mắt chính thức.",
        contactLbl:"Liên hệ",
        s:{agree:["Chấp nhận điều khoản","Bằng việc sử dụng Dịch vụ, bạn được coi là đã đồng ý các điều khoản này. Nếu không đồng ý, vui lòng không sử dụng."],
          account:["Tài khoản","Vui lòng đăng ký bằng thông tin chính xác. Quản lý tài khoản là trách nhiệm của bạn. Liên hệ nếu phát hiện sử dụng trái phép."],
          fee:["Phí và hủy","Giá các gói trả phí hiển thị trên trang mỗi gói. Bạn có thể hủy bất cứ lúc nào và dùng đến hết kỳ. Mua mới được hoàn tiền trong 14 ngày. Sau đó và khi gia hạn, không hoàn tiền."],
          content:["Bài đăng và nội dung","Quyền đối với bản ghi, công thức, bình luận bạn đăng thuộc về bạn. Dịch vụ có thể dùng trong phạm vi cần thiết để cung cấp và cải thiện dịch vụ."],
          support:["Ủng hộ (tip)","Ủng hộ là cách hỗ trợ nhà sáng tạo. Một phần số tiền nhận được được thu làm phí. Xem trang liên hệ hoặc thông tin để biết chi tiết."],
          prohibited:["Hành vi bị cấm","Vui lòng tránh hành vi vi phạm pháp luật, làm hại người khác, đăng thông tin sai lệch, hoặc cản trở hoạt động của dịch vụ."],
          health:["Miễn trừ về sức khỏe","Dịch vụ nhằm hỗ trợ duy trì và cải thiện sức khỏe, không nhằm mục đích khám chữa bệnh, chẩn đoán hay điều trị. Các con số và gợi ý chỉ là ước tính và không đảm bảo bất kỳ hiệu quả y tế hay độ chính xác nào. Nếu lo lắng về sức khỏe, có bệnh nền hoặc đang điều trị, luôn tham khảo bác sĩ hoặc chuyên gia."],
          liability:["Giới hạn trách nhiệm","Chúng tôi cố gắng cung cấp dịch vụ ổn định nhất có thể, nhưng có thể xảy ra gián đoạn hoặc lỗi. Chúng tôi giới hạn trách nhiệm trong phạm vi luật cho phép."],
          changes:["Thay đổi điều khoản","Nếu thay đổi các điều khoản này, chúng tôi sẽ thông báo trong ứng dụng. Tiếp tục sử dụng sau khi thay đổi được coi là chấp nhận."]}},
      "Bahasa Indonesia":{hdr:"Ketentuan Penggunaan",
        intro:"Ketentuan ini mengatur syarat penggunaan revo (\"Layanan\"). Silakan baca sebelum memulai.",

        contactLbl:"Kontak",
        s:{agree:["Persetujuan","Dengan menggunakan Layanan, kamu dianggap menyetujui ketentuan ini. Jika tidak setuju, mohon tidak menggunakannya."],
          account:["Akun","Daftar dengan informasi yang akurat. Pengelolaan akun adalah tanggung jawabmu. Hubungi kami jika menemukan penggunaan tidak sah."],
          fee:["Biaya & pembatalan","Harga paket berbayar ditampilkan di halaman tiap paket. Kamu bisa membatalkan kapan saja dan memakainya sampai periode berakhir. Pembelian baru dapat refund dalam 14 hari; setelahnya dan saat perpanjangan tanpa refund."],
          content:["Postingan & konten","Hak atas catatan, resep, dan komentar yang kamu posting menjadi milikmu. Layanan dapat menggunakannya sejauh diperlukan untuk menyediakan dan meningkatkan layanan."],
          support:["Dukungan (tip)","Dukungan adalah cara mendukung kreator. Sebagian dari jumlah yang diterima dikenakan sebagai biaya. Lihat halaman kontak atau info untuk detail."],
          prohibited:["Tindakan terlarang","Mohon hindari tindakan ilegal, tindakan yang merugikan orang lain, memposting informasi palsu, atau tindakan yang mengganggu operasi layanan."],
          health:["Penafian kesehatan","Layanan ini bertujuan mendukung pemeliharaan dan peningkatan kesehatan, dan bukan untuk tindakan medis, diagnosis, atau pengobatan. Angka dan saran yang ditampilkan hanya perkiraan dan tidak menjamin efek medis atau keakuratan apa pun. Jika ada kekhawatiran kesehatan, penyakit, atau sedang dalam pengobatan, selalu konsultasikan ke dokter atau profesional."],
          liability:["Batas tanggung jawab","Kami berupaya menyediakan layanan sestabil mungkin, tetapi gangguan atau masalah bisa terjadi. Kami membatasi tanggung jawab sejauh diizinkan hukum."],
          changes:["Perubahan ketentuan","Jika kami mengubah ketentuan ini, kami akan memberi tahu di aplikasi. Melanjutkan penggunaan setelah perubahan dianggap sebagai persetujuan."]}}
    };
    var cur=REVO.lang(), dark=REVO.dark();
    var T={
      dark:{bg:"#16140F",txt:"#E8E2D6",sub:"#8A7E68",muted:"#6E6555",head:"#F0EBE2",card:"#1A1814",cardBd:"#2A2620",accent:"#E3C56A",iconBg:"#1F1C16",iconBd:"#3A352A",iconCol:"#B0A488"},
      light:{bg:"#FFFFFF",txt:"#4A453B",sub:"#8A7E68",muted:"#B7A98F",head:"#2E2A24",card:"#FBF7F1",cardBd:"#F0EAE0",accent:"#BA7517",iconBg:"#FFFFFF",iconBd:"#E8E0CE",iconCol:"#9A8E78"}
    };
    var $=function(id){return document.getElementById(id);}; try{REVO.tint(T);}catch(_e){}
    function renderSections(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('sections').innerHTML="";
      SEC.forEach(function(k,i){
        var sec=d.s[k];
        var el=document.createElement('div');
        el.innerHTML='<p style="font-size:14px; color:'+t.head+'; margin:0 0 6px; font-weight:600;">'+(i+1)+'. '+sec[0]+'</p>'+
          '<p style="font-size:12px; color:'+t.txt+'; margin:0; line-height:1.75;">'+sec[1]+'</p>';
        $('sections').appendChild(el);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('intro').textContent=d.intro; $('updated').textContent=d.updated;
      $('contactLbl').textContent=d.contactLbl; $('note').textContent=d.note;
      renderSections();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.head;
      $('intro').style.color=t.sub; $('updated').style.color=t.muted; $('note').style.color=t.muted;
      $('contactBox').style.background=t.card; $('contactBox').style.borderColor=t.cardBd; $('contactLbl').style.color=t.sub;
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      applyUI();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyTheme();
  })();
</script>
</div>

<script>
(function(){
  /* 戻る矢印（モックの見た目のまま遷移だけ実装） */
  var bk=document.querySelector('i.ti-arrow-left');
  if(!bk) return;
  bk.style.cursor='pointer';
  bk.onclick=function(){ if(document.referrer && history.length>1){ history.back(); } else { REVO.go('settings'); } };
})();
</script>
</body>
