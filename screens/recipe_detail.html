    var cur=REVO.lang(), dark=REVO.dark();
    // 各工程の時間メタ（言語共通）。type:micro=レンジ(換算対象,base=600W基準の分), plain=固定(分)
    var STEP_META=[
      {type:"plain",min:1},
      {type:"micro",base:3},
      {type:"micro",base:2},
      {type:"plain",min:1},
      {type:"plain",min:1}
    ];
    var WATTS=[500,600,700,1000];
    var curWatt=600;
    function fmtMin(mins){
      // 分（小数可）→ "3分40秒" / "2分" 形式は言語で。ここでは分秒の数値を返す
      var totalSec=Math.round(mins*60/10)*10; // 10秒単位に丸め
      var m=Math.floor(totalSec/60), s=totalSec%60;
      return {m:m,s:s};
    }
    var pfcColors={p:"#5DCAA5",f:"#E3C56A",c:"#8A9AE0"};
    var pfcMax={p:40,f:30,c:60}; // バー基準
    var T={
      dark:{bg:"#16140F",txt:"#F0EBE2",sub:"#8A7E68",muted:"#6E6555",card:"#1A1814",cardBd:"#2A2620",row:"#2A2620",track:"#2A2620",badgeBg:"#221E14",badgeTx:"#D8C79A",iconBg:"#1F1C16",iconBd:"#3A352A",iconCol:"#B0A488",accent:"#E3C56A"},
      light:{bg:"#FFFFFF",txt:"#2E2A24",sub:"#8A7E68",muted:"#B7A98F",card:"#FBF7F1",cardBd:"#F0EAE0",row:"#F0EAE0",track:"#EDE6D8",badgeBg:"#FBF3E0",badgeTx:"#7A6A3E",iconBg:"#FFFFFF",iconBd:"#E8E0CE",iconCol:"#9A8E78",accent:"#BA7517"}
    };
    var $=function(id){return document.getElementById(id);}; try{REVO.tint(T);}catch(_e){}
    function badge(txt, ic, t, strong){
      return '<span style="display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:5px 11px; border-radius:999px; background:'+(strong?t.accent:t.badgeBg)+'; color:'+(strong?(dark?"#16140F":"#FFFFFF"):t.badgeTx)+'; font-weight:'+(strong?"600":"400")+';">'+(ic?'<i class="ti '+ic+'" style="font-size:12px;"></i>':'')+txt+'</span>';
    }
    function renderHero(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      // レンジ工程の合計（600W基準）をW換算
      var baseSum=0; STEP_META.forEach(function(m){ if(m.type==="micro") baseSum+=m.base; });
      var mins=baseSum*600/curWatt;
      var f=fmtMin(mins);
      var human = f.s===0 ? (f.m+d.minU) : (f.m===0 ? f.s+d.secU : f.m+d.minU+f.s+d.secU);
      var txt=d.microPre.replace("{w}",curWatt)+" "+human;
      $('heroTime').innerHTML=badge(txt,"ti-flame",t,true);
    }
    function renderEffort(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('effortRow').innerHTML = badge(d.noKnife,"ti-check",t)+badge(d.noBoard,"ti-check",t)+badge(d.lessWash,"ti-droplet",t);
    }
    function renderPFC(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('nutriLbl').textContent=d.nutri; $('kcalVal').textContent=d.kcal.replace("{n}",PFC.kcal);
      $('pfcBars').innerHTML="";
      [["p",PFC.p],["f",PFC.f],["c",PFC.c]].forEach(function(x){
        var k=x[0], v=x[1], pct=Math.min(100, v/pfcMax[k]*100);
        var row=document.createElement('div');
        row.innerHTML='<div style="display:flex; align-items:center; justify-content:space-between; margin:0 0 4px;"><span style="font-size:11px; color:'+t.sub+';">'+d.pfc[k]+'</span><span style="font-size:12px; color:'+t.txt+'; font-weight:600;">'+d.unitG.replace("{n}",v)+'</span></div>'+
          '<div style="width:100%; height:6px; background:'+t.track+'; border-radius:3px; overflow:hidden;"><div style="width:'+pct+'%; height:6px; background:'+pfcColors[k]+';"></div></div>';
        $('pfcBars').appendChild(row);
      });
    }
    function renderIngs(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('ingLbl').textContent=d.ingLbl; $('ingList').innerHTML="";
      d.ings.forEach(function(ing,i){
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:11px 2px; "+(i<d.ings.length-1?"border-bottom:0.5px solid "+t.row+";":"");

        $('ingList').appendChild(row);
      });
    }
    function timeStr(meta){
      var d=D[cur]||D["English"];
      function human(mins){
        var f=fmtMin(mins);
        if(f.s===0) return f.m+d.minU;
        if(f.m===0) return f.s+d.secU;
        return f.m+d.minU+f.s+d.secU;
      }
      if(meta.type==="micro"){
        var mins=meta.base*600/curWatt;
        return { micro:true, txt: d.microPre.replace("{w}",curWatt)+" "+human(mins) };
      } else {
        return { micro:false, txt: human(meta.min) };
      }
    }
    function renderSteps(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('stepLbl').textContent=d.stepLbl; $('stepList').innerHTML="";
      d.steps.forEach(function(s,i){
        var meta=STEP_META[i]||{type:"plain",min:1};
        var ts=timeStr(meta);
        var isMicro=ts.micro;
        var row=document.createElement('div');
        row.style.cssText="display:flex; gap:12px;";
        row.innerHTML='<div style="width:26px; height:26px; border-radius:50%; background:'+t.accent+'; color:'+(dark?"#16140F":"#FFFFFF")+'; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; font-family:Jost;">'+(i+1)+'</div>'+
          '<div style="flex:1;"><p style="font-size:13px; color:'+t.txt+'; margin:0 0 6px; line-height:1.6;">'+s.t+'</p>'+
          '<span style="display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 10px; border-radius:999px; background:'+(isMicro?t.accent:t.badgeBg)+'; color:'+(isMicro?(dark?"#16140F":"#FFFFFF"):t.badgeTx)+'; font-weight:'+(isMicro?"600":"400")+';"><i class="ti '+(isMicro?"ti-flame":"ti-clock")+'" style="font-size:12px;"></i>'+ts.txt+'</span></div>';
        $('stepList').appendChild(row);
      });
    }
    function renderWatts(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('wattLbl').textContent=d.wattLbl;
      $('wattChips').innerHTML="";
      WATTS.forEach(function(w){
        var on=(curWatt===w);
        var chip=document.createElement('span');
        chip.style.cssText="font-size:12px; padding:7px 15px; border-radius:999px; cursor:pointer; font-family:Jost; "+(on?"background:"+t.accent+"; color:"+(dark?"#16140F":"#FFFFFF")+"; font-weight:600;":"background:"+t.card+"; color:"+t.sub+"; border:0.5px solid "+t.cardBd+";");
        chip.textContent=w+"W";
        chip.onclick=function(){ curWatt=w; renderWatts(); renderSteps(); };
        $('wattChips').appendChild(chip);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('title').textContent=d.title; $('author').textContent=d.author; $('tip').textContent=d.tip;
      if($('photoHint')) $('photoHint').textContent=d.photoHint||"";
      renderHero(); renderEffort(); renderPFC(); renderIngs(); renderWatts(); renderSteps();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('title').style.color=t.txt; $('author').style.color=t.sub;
      $('pfcCard').style.background=t.card; $('pfcCard').style.borderColor=t.cardBd;
      $('ingLbl').style.color=t.txt; $('stepLbl').style.color=t.txt;
      $('tipCard').style.background= dark?"linear-gradient(135deg,#16241E,#13211C)":"linear-gradient(135deg,#EAF6F1,#E0F0E6)"; $('tipCard').style.borderColor= dark?"#243A30":"#D6EAE0"; $('tip').style.color= dark?"#C9E3D8":"#2E5D4E";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      applyUI();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyTheme();
  })();
</script>
