  };
  var $=function(id){return document.getElementById(id);}; try{REVO.tint(T);}catch(_e){}
  function dd(){ return D[cur]||D["English"]; }

  /* チャレンジ作成はベーシック以上の特典（Lifeと同一ルール・オーナー決定 2026-07-12） */
  function paidEntitled(){
    try{ var sb2=JSON.parse(localStorage.getItem('revo.sub')||'null');

    }catch(e){ return false; }
  }

    return '<div style="background:'+t.card+'; border:0.5px solid '+t.cardBd+'; border-radius:15px; padding:14px 15px; margin:0 0 9px;">'+
      '<div style="display:flex; align-items:center; gap:10px; margin:0 0 10px;">'+
        '<div style="width:34px; height:34px; border-radius:10px; background:'+c+'22; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><i class="ti '+(THEME_ICON[ch.type]||"ti-flag")+'" style="font-size:17px; color:'+c+';"></i></div>'+
        '<div style="flex:1;"><p style="font-size:13px; color:'+t.txt+'; margin:0; font-weight:600;">'+fname(ch.type)+' · '+ch.days+d.day+'</p></div>'+
        '<i class="ti ti-x chDel" data-id="'+ch.id+'" style="font-size:15px; color:'+t.muted+'; cursor:pointer; padding:4px;"></i>'+
      '</div>'+
      '<div style="width:100%; height:6px; background:'+t.bar+'; border-radius:3px; overflow:hidden; margin:0 0 8px;"><div style="width:'+pct+'%; height:6px; background:'+c+'; border-radius:3px; transition:width 0.4s;"></div></div>'+
      '<div style="display:flex; align-items:center; justify-content:space-between;">'+meta+'</div>'+
    '</div>';
  }
  function renderList(){
    var t=dark?T.dark:T.light, d=dd();
    var all=REVO.challenges();
    var act=[], done=[];
    all.forEach(function(ch){ (REVO.challengeProgress(ch).over?done:act).push(ch); });
    var h="";
    if(!all.length){
      h='<div style="background:'+t.card+'; border:0.5px solid '+t.cardBd+'; border-radius:15px; padding:22px 18px; text-align:center;">'+
        '<i class="ti ti-flag" style="font-size:26px; color:'+t.muted+';"></i>'+
        '<p style="font-size:12px; color:'+t.sub+'; margin:10px 0 0; line-height:1.7;">'+d.empty+'</p></div>';
    } else {
      if(act.length){ h+='<p style="font-size:11px; color:'+t.sub+'; margin:0 0 9px; font-weight:500;">'+d.activeLbl+'</p>'+act.map(card).join(""); }
      if(done.length){ h+='<p style="font-size:11px; color:'+t.sub+'; margin:14px 0 9px; font-weight:500;">'+d.doneLbl+'</p>'+done.map(card).join(""); }
    }
    $('listWrap').innerHTML=h;
    document.querySelectorAll('.chDel').forEach(function(x){
      x.onclick=function(e){ e.stopPropagation();
        if(!confirm(dd().delMsg)) return;
        REVO.removeChallenge(x.getAttribute('data-id')); renderList();
      };
    });
  }
  function applyUI(){
    var d=dd();
    $('hdrTtl').textContent=d.hdr; $('lead').textContent=d.lead;
    $('createLbl').innerHTML=d.create+(paidEntitled()?'':' <i class="ti ti-lock" style="font-size:12px; vertical-align:-1px;"></i>');
    document.title=d.hdr+" — revo fit";
    renderCreate(); renderList();
  }
  function applyTheme(){
    var t=dark?T.dark:T.light;
    $('screen').style.background=t.bg;
    $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
    $('lead').style.color=t.sub;
    $('createBtn').style.borderColor= dark?"#3A352A":"#E0DACE"; $('createBtn').style.color=t.sub;
    [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
    $('langBtn').querySelector('i').style.color=t.iconCol;
    $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
    $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
    renderCreate(); renderList();
  }
  function renderMenu(){
    var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
    $('langMenu').innerHTML="";
    langs.forEach(function(l){
      var on=(l===cur);
      var row=document.createElement('div');
      row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
      row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
      row.onmouseleave=function(){ row.style.background="transparent"; };
      row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
      row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyUI(); applyTheme(); };
      $('langMenu').appendChild(row);
    });
  }
  $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
  $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
  document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
  $('langMenu').onclick=function(e){ e.stopPropagation(); };
  $('createBtn').onclick=function(e){ e.stopPropagation();
    if(!paidEntitled()){ REVO.go('plans'); return; }
    creating=!creating; renderCreate(); };
  applyUI(); applyTheme();
  var bk=document.querySelector('i.ti-arrow-left');
  if(bk){ bk.style.cursor='pointer'; bk.onclick=function(){ if(document.referrer && history.length>1){ history.back(); } else { REVO.go('home'); } }; }
})();
</script>
</body>
</html>
