<title>ホーム — revo fit</title>
<link rel="manifest" href="../manifest.webmanifest">

<style id="revoShell">
html,body{margin:0;padding:0;}
body{background:#F1EFEA;}
@media (max-width:440px){
  body>.frame{padding:0!important;border-radius:0!important;background:transparent!important;min-height:100vh;min-height:100dvh;}
  body>.frame>#screen{border-radius:0!important;max-width:none!important;min-height:100vh;min-height:100dvh;}
}
</style>
<script src="../js/config.js"></script>
<script src="../js/revo.js"></script>
<script src="../js/revo-cloud.js"></script>
</head>
<body>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">
<div class="frame" style="background:#F1EFEA; border-radius:14px; padding:12px; display:flex; justify-content:center;">
<div id="screen" style="background:#16140F; border-radius:20px; font-family:var(--font-sans); max-width:380px; width:100%; margin:0 auto; overflow:hidden; position:relative; transition:background 0.35s; min-height:760px; display:flex; flex-direction:column;">

  <style>
    @keyframes revoIntroGlow{0%,100%{filter:drop-shadow(0 6px 18px rgba(0,0,0,0.45)) drop-shadow(0 0 6px rgba(227,197,106,0.15));}50%{filter:drop-shadow(0 6px 18px rgba(0,0,0,0.45)) drop-shadow(0 0 16px rgba(227,197,106,0.4));}}
    @keyframes revoIntroOut{0%{opacity:1; visibility:visible;}100%{opacity:0; visibility:hidden;}}
    @keyframes revoIconIn{
      0%{opacity:0; transform:scale(0.82);}
      45%{opacity:1; transform:scale(1);}
      82%{opacity:1; transform:scale(1);}
      100%{opacity:1; transform:scale(1.06);}
    }
    @keyframes revoTagFade{
      0%,30%{opacity:0; transform:translateY(6px);}
      50%{opacity:0.85; transform:translateY(0);}
      82%{opacity:0.85;}
      100%{opacity:0;}
    }
  </style>
  <div class="revoIntro" style="position:absolute; inset:0; z-index:60; background:#16140F; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; animation:revoIntroOut 0.6s ease 2.5s forwards;">
    <div style="transform-origin:center center; animation:revoIconIn 3.0s cubic-bezier(0.4,0,0.2,1) both, revoIntroGlow 2.8s ease-in-out infinite;">
      <svg width="122" height="122" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="revo fit" style="display:block;">
        <defs><clipPath id="introIcon"><rect width="180" height="180" rx="40"/></clipPath></defs>
        <g clip-path="url(#introIcon)">
          <rect width="180" height="180" fill="#16140F"/>
          <text x="90" y="70" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="44" letter-spacing="1.5" fill="#F0EBE2">revo</text>
          <rect x="0" y="116" width="180" height="64" fill="#E3C56A"/>
          <text x="90" y="149" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="500" font-size="34" letter-spacing="1" fill="#16140F">fit</text>
        </g>
      </svg>
    </div>
    <p style="font-size:14px; color:#8A7E68; margin:0; text-align:center; letter-spacing:0.08em; font-weight:300; animation:revoTagFade 3.0s ease both;">revo in your life</p>
  </div>

  <h2 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;">Revo Fit のホーム。総合スコアと、睡眠・食事・運動・回復の内訳。そこから導かれた今日の一手。考えなくていい。言語と明暗を切り替えられる</h2>

  <div id="hdr" style="display:flex; align-items:center; justify-content:space-between; padding:18px 18px 10px;">
    <div style="display:flex; align-items:center; gap:9px;">
      <svg viewBox="0 0 116 30" width="92" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="revo fit">
        <text x="0" y="23" font-family="Jost,sans-serif" font-weight="200" font-size="25" letter-spacing="0.5" fill="#F0EBE2"><tspan id="logoRevo" fill="#F0EBE2">revo </tspan><tspan id="logoFit" fill="#E3C56A">fit</tspan></text>
      </svg>
    </div>
    <div style="display:flex; align-items:center; gap:9px;">
      <button id="langBtn" aria-label="言語" style="width:32px; height:32px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i class="ti ti-world" style="font-size:16px; color:#B0A488;" aria-hidden="true"></i></button>
      <button id="themeBtn" aria-label="明るさ" style="width:32px; height:32px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i id="themeIcon" class="ti ti-sun" style="font-size:16px; color:#E3C56A;" aria-hidden="true"></i></button>
    </div>
    <div id="langMenu" style="display:none; position:absolute; top:56px; right:18px; width:206px; max-height:300px; overflow-y:auto; background:#1F1C16; border:0.5px solid #3A352A; border-radius:14px; padding:6px; box-shadow:0 18px 40px -12px rgba(0,0,0,0.7); z-index:30;"></div>
  </div>

  <div style="flex:1; padding:6px 20px 0; display:flex; flex-direction:column;">

    <p id="greet" style="font-size:14px; color:#8A7E68; margin:6px 0 6px;">おはようございます</p>
    <p id="scoreState" style="font-size:14px; color:#5DCAA5; margin:0 0 18px; font-weight:500;">いい調子です。食事だけ、あと一歩。</p>

    <!-- 総合スコア（円の中に rf score と数字） -->
    <div style="display:flex; flex-direction:column; align-items:center; margin:0 0 6px;">
      <svg viewBox="0 0 240 240" style="width:188px; height:188px;" role="img" aria-label="rf score 78">
        <defs><linearGradient id="fitGlow" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F0D98A"/><stop offset="55%" stop-color="#E3C56A"/><stop offset="100%" stop-color="#C9A24E"/></linearGradient></defs>
        <circle cx="120" cy="120" r="100" fill="none" stroke="#2A2620" stroke-width="13"/>
        <circle id="fitArc" cx="120" cy="120" r="100" fill="none" stroke="url(#fitGlow)" stroke-width="13" stroke-linecap="round" transform="rotate(-90 120 120)" stroke-dasharray="628" stroke-dashoffset="628" style="filter:drop-shadow(0 0 8px rgba(227,197,106,0.4));"/>
        <text id="scoreRingLbl" x="120" y="90" text-anchor="middle" font-size="19" font-weight="500" fill="#C9A24E" font-family="Jost,sans-serif" letter-spacing="1">rf score</text>
        <text id="fitNum" x="120" y="154" text-anchor="middle" font-size="62" font-weight="600" fill="#F0EBE2" font-family="var(--font-sans)">0</text>
      </svg>
    </div>

    <!-- 要素別スコア（色とゲージで直感的） -->
    <div id="factors" style="display:flex; gap:8px; margin:20px 0 0;"></div>

    <!-- 今日の一手（弱点と繋がる） -->
    <div style="margin:22px 0 0;">
      <p id="nextLbl" style="font-size:12px; color:#8A7E68; margin:0 0 9px; font-weight:500; letter-spacing:0.03em;">だから、きょうの一手</p>
      <div id="nextCard" style="background:linear-gradient(135deg,#1F1B12,#46412F); border:0.5px solid #4A4230; border-radius:18px; padding:17px; display:flex; align-items:center; gap:14px; transition:all 0.35s;">
        <div style="width:48px; height:48px; border-radius:13px; background:rgba(227,197,106,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0;"><i id="nextIcon" class="ti ti-salad" style="font-size:25px; color:#E3C56A;" aria-hidden="true"></i></div>
        <div style="flex:1;">
          <p id="nextTtl" style="font-size:15px; font-weight:600; color:#F0EBE2; margin:0 0 3px;">夜は、たんぱく質を少し多めに</p>
          <p id="nextSub" style="font-size:12px; color:#B0A488; margin:0; line-height:1.5;">食事スコアが低め。あと卵2個ぶん（たんぱく質 約14g）で、今日は整います。</p>
        </div>
        <i class="ti ti-chevron-right" style="font-size:19px; color:#8A7E68;" aria-hidden="true"></i>
      </div>
    </div>

    <button id="recordBtn" style="margin:14px 0 0; width:100%; background:#E3C56A; border:none; color:#16140F; font-size:15px; font-weight:600; padding:15px; border-radius:15px; display:flex; align-items:center; justify-content:center; gap:7px; cursor:pointer;"><i class="ti ti-plus" style="font-size:18px;" aria-hidden="true"></i><span id="recordLbl">記録する</span></button>

    <button id="moreBtn" style="margin:13px 0 6px; width:100%; background:transparent; border:none; color:#8A7E68; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px;"><span id="moreLbl">くわしい分析を見る</span><i class="ti ti-chevron-down" style="font-size:15px;" aria-hidden="true"></i></button>

  </div>

  <div id="nav" style="display:none; align-items:center; justify-content:space-around; padding:10px 8px 14px; border-top:0.5px solid #2A2620; background:#16140F; transition:all 0.35s;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-home-2" style="font-size:21px; color:#E3C56A;" aria-hidden="true"></i><span id="nav0" style="font-size:9px; color:#E3C56A;">ホーム</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-arrow-guide" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav1" style="font-size:9px; color:#6E6555;">次の一手</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-chart-line" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav2" style="font-size:9px; color:#6E6555;">未来予測</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-pencil-plus" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav3" style="font-size:9px; color:#6E6555;">記録</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-award" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav4" style="font-size:9px; color:#6E6555;">メダル</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-users" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav5" style="font-size:9px; color:#6E6555;">SNS</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-salad" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav6" style="font-size:9px; color:#6E6555;">食事</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-barbell" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav7" style="font-size:9px; color:#6E6555;">運動</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px;"><i class="ti ti-zzz" style="font-size:21px; color:#6E6555;" aria-hidden="true"></i><span id="nav8" style="font-size:9px; color:#6E6555;">回復</span></div>
  </div>

</div>
</div>

        record:"Catat",more:"Lihat analisis detail",nav:["Beranda","Langkah","Prakiraan","Catat","Medali"]}
    };
    var cur=REVO.lang(), dark=REVO.dark();
    var T={
      dark:{bg:"#16140F",txt:"#F0EBE2",sub:"#8A7E68",muted:"#6E6555",ring:"#2A2620",num:"#F0EBE2",ringLbl:"#C9A24E",state:"#5DCAA5",nextSub:"#B0A488",factorBg:"#1A1814",factorBd:"#2A2620",factorName:"#8A7E68",navBg:"#16140F",navBd:"#2A2620",navOff:"#6E6555",iconBg:"#1F1C16",iconBd:"#3A352A",iconCol:"#B0A488",accent:"#E3C56A"},
      light:{bg:"#FFFFFF",txt:"#2E2A24",sub:"#8A7E68",muted:"#B7A98F",ring:"#EDE6D8",num:"#2E2A24",ringLbl:"#A87A1E",state:"#0F9E84",nextSub:"#8A7560",factorBg:"#FBF7F1",factorBd:"#F0EAE0",factorName:"#8A7E68",navBg:"#FFFFFF",navBd:"#F0EAE0",navOff:"#B7A98F",iconBg:"#FFFFFF",iconBd:"#E8E0CE",iconCol:"#9A8E78",accent:"#BA7517"}
    };
    var $=function(id){return document.getElementById(id);}; try{REVO.tint(T);}catch(_e){}
    function renderFactors(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('factors').innerHTML="";
      FACTORS.forEach(function(f){
        var key=f[0], icon=f[1], sc=f[2], has=(sc!=null), col=has?scoreColor(sc):[t.factorName,"transparent"];
        var cell=document.createElement('div');
        cell.style.cssText="flex:1; background:"+t.factorBg+"; border:0.5px solid "+t.factorBd+"; border-radius:14px; padding:11px 6px 10px; display:flex; flex-direction:column; align-items:center; gap:6px;";
        cell.innerHTML=
          '<i class="ti '+icon+'" style="font-size:19px; color:'+col[0]+';" aria-hidden="true"></i>'+
          '<span style="font-size:16px; font-weight:600; color:'+col[0]+';">'+(has?sc:"--")+'</span>'+
          '<div style="width:100%; height:3px; background:'+(dark?"#2A2620":"#EDE6D8")+'; border-radius:2px; overflow:hidden;"><div style="width:'+(has?sc:0)+'%; height:3px; background:'+col[0]+';"></div></div>'+
          '<span style="font-size:10px; color:'+t.factorName+';">'+d.factors[key]+'</span>';
        $('factors').appendChild(cell);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('greet').textContent=d.greet; $('scoreRingLbl').textContent=d.ringLbl; $('scoreState').textContent=d.state;
      $('nextLbl').textContent=d.nextLbl; $('nextTtl').textContent=d.nextTtl; $('nextSub').textContent=d.nextSub;
      $('recordLbl').textContent=d.record; $('moreLbl').textContent=d.more;
      for(var i=0;i<5;i++){ $('nav'+i).textContent=d.nav[i]; }
      $('nav5').textContent="SNS";
      $('nav6').textContent=d.factors.food;
      $('nav7').textContent=d.factors.move;
      $('nav8').textContent=d.factors.recover;
      renderFactors();
      patchDynamic();
    }
    /* ROADMAP 13章：サンプル文を実データ由来に差し替え（見た目・要素は不変） */
    function patchDynamic(){
      var d=D[cur]||D["English"], E=(REVO.EMPTY[cur]||REVO.EMPTY["English"]);
      if(!_sc){
        $('scoreState').textContent=E.state;
        $('nextTtl').textContent=E.ttl;
        $('nextSub').textContent=E.sub;
        return;
      }
      var lowKey=null, lowVal=101;
      FACTORS.forEach(function(f){ if(f[2]!=null && f[2]<lowVal){ lowVal=f[2]; lowKey=f[0]; } });
      if(lowKey!=null && lowVal<75){
        var fname=d.factors[lowKey];
        $('scoreState').textContent=E.lowTtl.replace('{f}',fname);
        $('nextTtl').textContent=E.lowTtl.replace('{f}',fname);
        $('nextSub').textContent=E.lowSub.split('{f}').join(fname);
      } else {
        $('scoreState').textContent=E.good;
        $('nextTtl').textContent=E.good;
        $('nextSub').textContent="";
      }
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('greet').style.color=t.sub;
      $('fitArc').previousElementSibling.setAttribute('stroke', t.ring);
      $('fitNum').setAttribute('fill', t.num); $('scoreRingLbl').setAttribute('fill', t.ringLbl);
      $('scoreState').style.color=t.state;
      $('nextLbl').style.color=t.sub; $('nextSub').style.color=t.nextSub;
      $('recordBtn').style.background=t.accent; $('recordBtn').style.color= dark?"#16140F":"#FFFFFF";
      $('moreBtn').style.color=t.sub;
      $('nav').style.background=t.navBg; $('nav').style.borderColor=t.navBd;
      var lr=document.getElementById('logoRevo'); if(lr) lr.setAttribute('fill', dark?"#F0EBE2":"#1A1813");
      var lf=document.getElementById('logoFit'); if(lf) lf.setAttribute('fill', dark?"#E3C56A":"#BA7517");
      for(var i=0;i<9;i++){ var on=(i===0); $('nav'+i).style.color= on?t.accent:t.navOff; $('nav'+i).previousElementSibling.style.color= on?t.accent:t.navOff; }
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderFactors();
    }
    function animate(){
      if(!_sc){ $('fitNum').textContent="--"; $('fitArc').style.strokeDashoffset=628; return; }
      var target=_sc.total, arc=$('fitArc'), num=$('fitNum'), full=628, end=full-(full*(target/100)), dur=1400, t0=null;
      function ease(p){ return 1-Math.pow(1-p,3); }
      function step(ts){ if(!t0)t0=ts; var p=Math.min((ts-t0)/dur,1), e=ease(p);
        arc.style.strokeDashoffset=full-((full-end)*e); num.textContent=Math.round(target*e);
        if(p<1) requestAnimationFrame(step); }
      requestAnimationFrame(step);
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme(); animate();
    /* 遷移：記録する→log／下タブ→各画面／くわしい分析→analysis */
    $('recordBtn').onclick=function(){ REVO.go('log'); };
    $('moreBtn').onclick=function(){ REVO.go('analysis'); };
    var _navGo=[null,'navigator','forecast','log','medals','feed','recipes','muscle_map','mypillow'];
    for(var ni=1; ni<9; ni++){ (function(i){
      $('nav'+i).parentNode.style.cursor='pointer';
      $('nav'+i).parentNode.onclick=function(){ REVO.go(_navGo[i]); };
    })(ni); }
  })();
</script>
</div>

</body>
