    function foodMatch(name){
      var n=(name||"").toLowerCase().trim();
      if(!n) return null;
      var best=null, bestLen=0;
      for(var i=0;i<FOOD_DB.length;i++){
        for(var j=0;j<FOOD_DB[i].a.length;j++){
          var al=FOOD_DB[i].a[j].toLowerCase();
          if(n.indexOf(al)>=0 && al.length>bestLen){ best=FOOD_DB[i]; bestLen=al.length; }
        }
      }
      return best;   /* 最長一致（部分語の誤マッチ防止） */
    }

      return false;
    }

    }

    var foodOpen={nut:false};

        : (dietSel===2 ? '<span style="font-size:11px; color:'+(dark?"#5DCAA5":"#0F9E84")+';">'+d.watchFat+' '+(F==null?0:Math.round(F))+'g</span>' : '');
      var dietChips=diets.map(function(x,i){ var on=(i===dietSel); return '<span class="dietChip" data-i="'+i+'" style="font-size:11px; padding:6px 12px; border-radius:999px; cursor:pointer; '+(on?"background:"+(dark?"#2A2418":"#FBF3E0")+"; color:"+t.accent+"; border:1.5px solid "+t.accent+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";")+'">'+x+'</span>'; }).join("");
      var dietRow=
        '<div style="display:flex; align-items:center; justify-content:space-between; margin:0 0 9px;">'+

      // 栄養くわしく（展開）
      var nutDetail = foodOpen.nut

            nutLineIn(t,d.sugar,S.food.nut.sugar,"nutSugar",1)+ nutLineIn(t,d.fiber,S.food.nut.fiber,"nutFiber",1)+ nutLineIn(t,d.salt,S.food.nut.salt,"nutSalt",0)+
            '<p style="font-size:10px; color:'+(dark?"#7FB89E":"#4E8A72")+'; margin:4px 0 0; line-height:1.6;"><i class="ti ti-seeding" style="font-size:12px; vertical-align:-1px;"></i> '+d.gutHint+'</p>'+
          '</div>'

    function nutLine(t,lbl,val){
      return '<div style="display:flex; align-items:center; justify-content:space-between;"><span style="font-size:12px; color:'+t.sub+';">'+lbl+'</span><span style="font-size:13px; color:'+t.cardName+'; font-weight:500;">'+val+'</span></div>';

        '<input class="mealIn" data-i="'+idx+'" value="'+esc(m.name)+'" placeholder="'+esc(d.mealEx[idx])+'" style="flex:1; background:transparent; border:0; border-bottom:1px dashed '+t.chipBd+'; font-size:12px; color:'+t.cardName+'; outline:none; font-family:inherit; padding:1px 2px;">'+
        '<span style="font-size:13px; color:'+t.accent+'; font-weight:500;"><input class="numIn" data-int="1" id="mealK'+idx+'" type="text" inputmode="numeric" value="'+(m.kcal? String(m.kcal):"")+'" placeholder="0" style="width:38px; text-align:right; font-size:13px; font-weight:500; color:'+t.accent+'; background:transparent; border:0; border-bottom:1px dashed '+t.chipBd+'; padding:0 1px; outline:none; font-family:inherit;"><span style="font-size:9px; color:'+t.sub+'; font-weight:400;"> kcal</span></span>'+

    function renderGroups(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('groups').innerHTML="";
      ITEMS.forEach(function(it){
        var key=it.key, isOpen=!!open[key];

        var chip=document.createElement('button');

          ? '<span style="font-size:10px; color:'+t.doneCol+'; background:'+t.doneBg+'; padding:4px 10px; border-radius:999px;"><i class="ti ti-check" style="font-size:11px; vertical-align:-1px;"></i> '+d.done+'</span>'

          box.style.cssText="background:"+t.open+"; border:0.5px solid "+t.openBd+"; border-top:none; border-radius:0 0 15px 15px; margin:-6px 7px 0; padding:16px 15px 14px;";
          if(key==="sleep") box.innerHTML=sleepInner(t);
          else if(key==="food") box.innerHTML=foodInner(t);
          else if(key==="move") box.innerHTML=moveInner(t);
          else if(key==="body") box.innerHTML=bodyInner(t);
          else if(key==="water") box.innerHTML=waterInner(t);
          else if(key==="condition") box.innerHTML=conditionInner(t);
          wrap.appendChild(box);
        }
        $('groups').appendChild(wrap);
      });
      // 食事内インタラクション
      document.querySelectorAll('.nutBtn').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); foodOpen.nut=!foodOpen.nut; renderGroups(); }; });
      document.querySelectorAll('.dietChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); S.food.dietSel=+b.getAttribute('data-i'); renderGroups(); }; });
      document.querySelectorAll('.condBowelChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); S.condition.bowel=+b.getAttribute('data-i'); renderGroups(); }; });
      document.querySelectorAll('.condMoodChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); S.condition.mood=+b.getAttribute('data-i'); renderGroups(); }; });
      document.querySelectorAll('.waterChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); S.water.sel=+b.getAttribute('data-i'); renderGroups(); }; });
      var wst=document.getElementById('waterSuppToggleBtn'); if(wst){ wst.onclick=function(e){ e.stopPropagation(); S.water.includeSupp=!S.water.includeSupp; renderGroups(); }; }
      // 体組成：＋−ボタンで微調整、数字は直接タップ入力も可能
      document.querySelectorAll('.adjB[data-key]').forEach(function(b){
        b.onclick=function(e){ e.stopPropagation();
          var inp=document.getElementById(b.getAttribute('data-key')); if(!inp) return;
          var step=parseFloat(b.getAttribute('data-step'))||0;
          var cur=parseFloat((inp.value||'0').replace(/[^0-9.\-]/g,''))||0;
          var nv=Math.round((cur+step)*10)/10; if(nv<0) nv=0;
          inp.value= inp.getAttribute('data-int') ? String(Math.round(nv)) : nv.toFixed(1);
          syncNum(b.getAttribute('data-key'), nv);
        };
      });
      document.querySelectorAll('.numIn').forEach(function(inp){
        inp.onclick=function(e){ e.stopPropagation(); inp.select(); };
        inp.onblur=function(){
          var raw=(inp.value||'').trim();
          if(raw===''){ syncNum(inp.id, null); return; }  /* 空欄は未入力のまま（エンプティステート） */
          var v=parseFloat(raw.replace(/[^0-9.\-]/g,''));
          if(isNaN(v)||v<0){ v=0; }
          if(inp.getAttribute('data-int')){ v=Math.round(v); inp.value=String(v); }
          else inp.value=(Math.round(v*10)/10).toFixed(1);
          syncNum(inp.id, v);
        };
        inp.oninput=function(){
          var v=parseFloat((inp.value||'').replace(/[^0-9.\-]/g,''));
          syncVal(inp.id, isNaN(v)?null:v);
          if(inp.id && inp.id.indexOf('mealK')===0){
            /* 合計をその場で更新（再描画なし＝入力を邪魔しない） */
            var tot=document.querySelector('.foodTotalNum');
            if(tot){ var kc=tot.querySelector('span'); tot.textContent=REVO.foodEaten(S.food).toLocaleString()+' '; if(kc) tot.appendChild(kc); }
          }
        };
        inp.onkeydown=function(e){ if(e.key==='Enter'){ inp.blur(); } };
      });
      bindExtra();
    }
    /* ===== 追加インタラクション（睡眠・運動・水分・食事の実データ化）===== */

      /* 複数料理の合算対応（オーナー報告バグ修正 2026-07-12）
         「ごはん、みそ汁」のように区切って書くと、各料理の標準1人前を自動合算。
         候補チップで料理ごとの量を変えると、その料理のぶんだけ差し替わる（他は保持）。 */
      function tokensOf(name){
        return (name||"").split(/[、，,・＋+\/\n]+/).map(function(x){return x.trim();}).filter(function(x){return x;});
      }
      function kcalOfTok(tk, chosen){
        if(chosen!=null) return (typeof chosen==="object") ? (+chosen.kc||0) : (+chosen||0);
        var hit=foodMatch(tk);
        return (hit && hit.p && hit.p.length) ? (+hit.p[0][1]||0) : null;
      }
      function macroOfTok(tk, chosen){
        if(chosen && typeof chosen==="object" && chosen.m && chosen.m.length===5) return chosen.m;
        var hit=foodMatch(tk);
        if(!hit || !hit.m) return null;
        var base=(+hit.p[0][1])||1;
        var kc=kcalOfTok(tk, chosen); if(kc==null) kc=base;
        var r=kc/base;
        return hit.m.map(function(v){ return v*r; });
      }
      /* 日次の栄養合算：全ミールの料理からPFC・糖質・食物繊維・塩分を自動計上（オーナー指示 2026-07-12） */
      function applyNutriDay(){
        var P=0,F=0,C=0,FB=0,SA=0,any=false;
        for(var mi=0; mi<4; mi++){
          var mm=S.food.meals[mi]; if(!mm) continue;
          var sel=mm._sel||{};
          tokensOf(mm.name).forEach(function(tk){
            var mac=macroOfTok(tk, sel[tk]);
            if(mac){ P+=mac[0]; F+=mac[1]; C+=mac[2]; FB+=mac[3]; SA+=mac[4]; any=true; }
          });
        }
        if(!any) return;   /* 1品も判定できない時は手入力値を尊重 */
        function r1(v){ return Math.round(v*10)/10; }
        S.food.pfc={p:Math.round(P), f:Math.round(F), c:Math.round(C)};
        S.food.nut={sugar:r1(Math.max(0,C-FB)), fiber:r1(FB), salt:r1(SA)};
        [["pfcP",S.food.pfc.p],["pfcF",S.food.pfc.f],["pfcC",S.food.pfc.c],
         ["nutSugar",S.food.nut.sugar],["nutFiber",S.food.nut.fiber],["nutSalt",S.food.nut.salt]].forEach(function(kv){
          var el=document.getElementById(kv[0]); if(el) el.value=String(kv[1]);
        });

      function applyKcal(i){
        var m=S.food.meals[i]; if(!m) return;
        var toks=tokensOf(m.name), sel=m._sel||{};
        var sum=0, any=false;
        toks.forEach(function(tk){
          var kc=kcalOfTok(tk, sel[tk]);
          if(kc!=null){ sum+=kc; any=true; }
        });
        if(!any) return;   /* 1品も判定できない時は手入力値を尊重 */
        m.kcal=Math.round(sum);
        var kIn=document.getElementById('mealK'+i); if(kIn) kIn.value=String(m.kcal);

        if(tot){ var sp=tot.querySelector('span'); tot.textContent=REVO.foodEaten(S.food).toLocaleString()+' '; if(sp) tot.appendChild(sp); }
        applyNutriDay();

      var d=D[cur]||D["English"];
      var bowelSel=S.condition.bowel, moodSel=S.condition.mood;
      var bowel=(d.condBowelStates||["Great","Normal","Constipated","Loose"]).map(function(x,i){
        var on=(i===bowelSel);
        return '<span class="condBowelChip" data-i="'+i+'" style="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; '+(on?"background:"+(dark?"#2E1E26":"#FBEEF4")+"; color:#E89BB8; border:1.5px solid #C97AA0;":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";")+'">'+x+'</span>';
      }).join("");
      var moods=(d.condMoods||["Good","Okay","Sluggish"]).map(function(x,i){
        var on=(i===moodSel);
        return '<span class="condMoodChip" data-i="'+i+'" style="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; '+(on?"background:"+(dark?"#2A2418":"#FBF3E0")+"; color:"+t.accent+"; border:1.5px solid "+t.accent+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";")+'">'+x+'</span>';
      }).join("");
      return '<div>'+
        // お通じ
        '<p style="font-size:12px; color:'+t.sub+'; margin:0 0 8px; font-weight:500;">'+d.condBowel+'</p>'+
        '<div style="display:flex; gap:7px; flex-wrap:wrap; margin:0 0 16px;">'+bowel+'</div>'+
        // 気分
        '<p style="font-size:12px; color:'+t.sub+'; margin:0 0 8px; font-weight:500;">'+d.condMood+'</p>'+
        '<div style="display:flex; gap:7px; flex-wrap:wrap; margin:0 0 12px;">'+moods+'</div>'+
        // 腸を繋ぐ一言
        '<p style="font-size:10px; color:'+(dark?"#7FB89E":"#4E8A72")+'; margin:0; line-height:1.6;"><i class="ti ti-seeding" style="font-size:12px; vertical-align:-1px;"></i> '+d.condGut+'</p>'+
      '</div>';
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('lead').textContent=d.lead; $('saveBtn').textContent=d.save;
      if(d.tease){ var tz=d.tease; $('teaseTtl').textContent=tz.ttl; $('teaseSub').textContent=tz.sub; $('pv1Lbl').textContent=tz.pv1; $('pv2Lbl').textContent=tz.pv2; $('pv3Lbl').textContent=tz.pv3; $('pv3a').textContent=tz.pv3a; $('pv3b').textContent=tz.pv3b; $('unlockLbl').textContent=tz.unlock; $('unlockSub').textContent=tz.unlockSub; }
      renderGroups();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdr').style.background=t.bg; $('hdrTtl').style.color=t.txt;
      $('lead').style.color=t.sub;
      $('teaseCard').style.background=t.card; $('teaseCard').style.borderColor=t.cardBd;
      $('teaseTtl').style.color=t.txt;
      $('unlockBtn').style.background=t.accent; $('unlockBtn').style.color= dark?"#16140F":"#FFFFFF";
      $('saveBtn').style.background=t.accent; $('saveBtn').style.color= dark?"#16140F":"#FFFFFF";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderGroups();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    /* docs/02：保存 → daily_log upsert → スコア再計算 → ホームで既存アニメが増減を表現 */
    $('saveBtn').onclick=function(){ REVO.saveLog(REVO.todayKey(), S); REVO.go('home'); };
    (function(){ var bk=document.querySelector('#hdr .ti-arrow-left'); if(bk){ bk.style.cursor='pointer'; bk.onclick=function(){ REVO.go('home'); }; } })();
    (function(){ var ub=$('unlockBtn'); if(ub){ ub.onclick=function(){ REVO.go('plans'); }; } })();
    applyUI();     (function(){
      var open=false;
      var th=document.getElementById('teaseHead');
      if(th){ th.onclick=function(){ open=!open; document.getElementById('teaseBody').style.display= open?'block':'none'; document.getElementById('teaseChev').style.transform= open?'rotate(180deg)':'rotate(0deg)'; }; }
    })();
    applyTheme();
  })();
</script>
</div>

</body>
</html>
