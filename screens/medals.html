    /* ===== 実データ（ローカル記録）から獲得判定。未獲得は条件ヒント＝ROADMAP 13章 ===== */
    var ST=REVO.stats();
    var _logs=REVO.allLogs(), _keys=Object.keys(_logs).sort();
    // 連続N日を最初に達成した日付
    function streakDate(n){
      var run=0, prev=null;
      for(var i=0;i<_keys.length;i++){
        var k=_keys[i];
        run = (prev!=null && (new Date(k+"T00:00:00")-new Date(prev+"T00:00:00"))/86400000===1) ? run+1 : 1;
        prev=k;
        if(run>=n) return k+" 00:00";
      }
      return null;
    }
    function firstAt(cond){
      for(var i=0;i<_keys.length;i++){
        var lg=_logs[_keys[i]];
        if(lg && lg._savedAt && cond(new Date(lg._savedAt), lg, _keys[i])) return _keys[i]+" "+new Date(lg._savedAt).toTimeString().slice(0,5);
      }
      return null;
    }
    function medal(ic,key,n,prog,dt){
      var got = prog>=n;
      return got ? {ic:ic,got:true,key:key,date:dt||(_keys.length?_keys[_keys.length-1]+" 00:00":"")}
                 : {ic:ic,got:false,prog:Math.min(prog,n),goal:n,key:key};
    }
    var MEDALS={
      streak:[
        medal("ti-flame","d3",3,ST.bestStreak,streakDate(3)),
        medal("ti-flame","d7",7,ST.bestStreak,streakDate(7)),
        medal("ti-trophy","d15",15,ST.bestStreak,streakDate(15)),
        medal("ti-trophy","d30",30,ST.bestStreak,streakDate(30))
      ],
      walk:[
        medal("ti-sun","wMorning",1,ST.morning,firstAt(function(t){return t.getHours()<9;})),
        medal("ti-moon","wNight",7,ST.night,firstAt(function(t){return t.getHours()>=21;})),
        medal("ti-calendar","wWeekend",4,ST.weekend,null),
        {ic:"ti-users",got:false,prog:0,goal:1,key:"wTogether"}          // SNS接続後に判定
      ],
      overcome:[
        {ic:"ti-flame",got:false,prog:0,goal:1,key:"plateau"}            // 停滞期突破：トレンド分析の運用後に判定
      ],
      share:[
        {ic:"ti-heart",got:false,prog:0,goal:1,key:"rFirst"},            // SNS接続後に判定

    // ===== Web Audio：獲得メダルのきらめき音 =====
    var actx=null;
    function chime(){
      try{
        if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
        var now=actx.currentTime;
        var notes=[659.25,783.99,1046.50]; // E5 G5 C6 明るい上昇
        notes.forEach(function(f,i){
          var o=actx.createOscillator(), g=actx.createGain();
          o.type="sine"; o.frequency.value=f;
          o.connect(g); g.connect(actx.destination);
          var t0=now+i*0.09;
          g.gain.setValueAtTime(0, t0);
          g.gain.linearRampToValueAtTime(0.18, t0+0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t0+0.5);
          o.start(t0); o.stop(t0+0.55);
        });
      }catch(e){}
    }
    function lockThud(){
      try{
        if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
        var now=actx.currentTime;
        var o=actx.createOscillator(), g=actx.createGain();
        o.type="sine"; o.frequency.value=220;
        o.connect(g); g.connect(actx.destination);
        g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.12, now+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, now+0.25);
        o.start(now); o.stop(now+0.3);
      }catch(e){}
    }

    // ===== メダルSVG（リボン＋円形メダル） =====
    function medalSVG(m, cat, size){
      var g=catMedalGrad[cat], col=catColors[cat];
      var uid=cat+"_"+m.key;
      if(m.got){
        return '<svg viewBox="0 0 80 104" width="'+size+'" height="'+(size*1.3)+'" xmlns="http://www.w3.org/2000/svg">'+
          '<defs><radialGradient id="mg'+uid+'" cx="38%" cy="32%" r="75%"><stop offset="0%" stop-color="'+g[0]+'"/><stop offset="70%" stop-color="'+col+'"/><stop offset="100%" stop-color="'+g[1]+'"/></radialGradient></defs>'+
          // リボン
          '<path d="M28 6 L40 44 L28 40 Z" fill="'+col+'" opacity="0.9"/>'+
          '<path d="M52 6 L40 44 L52 40 Z" fill="'+g[1]+'" opacity="0.9"/>'+
          // 外円
          '<circle cx="40" cy="66" r="30" fill="url(#mg'+uid+')" stroke="'+g[0]+'" stroke-width="1.5"/>'+
          // 内リング（彫刻風）
          '<circle cx="40" cy="66" r="23" fill="none" stroke="'+g[1]+'" stroke-width="1.4" opacity="0.7"/>'+
          '<circle cx="40" cy="66" r="24.5" fill="none" stroke="'+g[0]+'" stroke-width="0.6" opacity="0.6"/>'+
          // ハイライト
          '<ellipse cx="31" cy="55" rx="9" ry="6" fill="#FFFFFF" opacity="0.28"/>'+
          '</svg>';
      } else {
        var t=dark?T.dark:T.light;
        return '<svg viewBox="0 0 80 104" width="'+size+'" height="'+(size*1.3)+'" xmlns="http://www.w3.org/2000/svg">'+
          '<path d="M28 6 L40 44 L28 40 Z" fill="'+t.lockRing+'"/>'+
          '<path d="M52 6 L40 44 L52 40 Z" fill="'+t.lockRing+'"/>'+
          '<circle cx="40" cy="66" r="30" fill="'+t.lockBg+'" stroke="'+t.lockRing+'" stroke-width="1.5" stroke-dasharray="3 3"/>'+
          '<circle cx="40" cy="66" r="23" fill="none" stroke="'+t.lockRing+'" stroke-width="1"/>'+
          '</svg>';
      }
    }
    function iconOverlay(m,cat){
      // メダル中央のアイコン（獲得は濃色、未獲得はmuted）
      var col = m.got ? "#16140F" : (dark?T.dark.muted:T.light.muted);
      return '<i class="ti '+m.ic+'" style="position:absolute; left:50%; top:63%; transform:translate(-50%,-50%); font-size:22px; color:'+col+';"></i>';
    }

    function fmtDate(iso){
      // "2026-06-16 21:34" を言語に応じて
      var parts=iso.split(" "); var d=parts[0].split("-"); var tm=parts[1];
      var y=d[0],mo=d[1],da=d[2];
      if(cur==="日本語") return y+"年"+parseInt(mo)+"月"+parseInt(da)+"日 "+tm;
      if(cur==="简体中文"||cur==="繁體中文") return y+"年"+parseInt(mo)+"月"+parseInt(da)+"日 "+tm;
      if(cur==="한국어") return y+"년 "+parseInt(mo)+"월 "+parseInt(da)+"일 "+tm;
      return da+"/"+mo+"/"+y+" "+tm;
    }

    function openSheet(m, cat){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var nm=d.names[m.key]||m.key, sub=d.sub[m.key]||"";
      var body="";
      body+='<div style="position:relative; display:inline-block; margin:0 0 6px;">'+medalSVG(m,cat,120)+iconOverlayBig(m,cat)+'</div>';
      body+='<p style="font-size:19px; font-weight:600; color:'+t.txt+'; margin:8px 0 3px; text-align:center;">'+nm+'</p>';
      body+='<p style="font-size:12px; color:'+t.sub+'; margin:0 0 14px; text-align:center;">'+sub+(m.count?" ・ "+d.times.replace("{n}",m.count):"")+'</p>';
      if(m.got){
        body+='<div style="display:flex; align-items:center; gap:7px; background:'+(dark?"#221E12":"#FBF3E0")+'; border:0.5px solid '+(dark?"#3A3220":"#EADCBE")+'; border-radius:11px; padding:9px 14px; margin:0 0 14px;">'+
          '<i class="ti ti-calendar" style="font-size:15px; color:'+t.accent+';"></i>'+
          '<span style="font-size:12px; color:'+(dark?"#C9C0AE":"#7A6A3E")+';">'+d.gotOn.replace("{d}", fmtDate(m.date))+'</span></div>';
        var pr=d.praise[m.key];
        if(pr) body+='<p style="font-size:13px; color:'+(dark?"#C9E3D8":"#2E5D4E")+'; margin:0 0 4px; text-align:center; line-height:1.7; background:'+(dark?"linear-gradient(135deg,#16241E,#13211C)":"linear-gradient(135deg,#EAF6F1,#E0F0E6)")+'; border-radius:12px; padding:13px 15px;">'+pr+'</p>';
      } else {
        var remain=(m.goal-m.prog);
        body+='<p style="font-size:13px; color:'+t.sub+'; margin:0; text-align:center; line-height:1.7;">'+d.lockMsg.replace("{n}", remain)+'</p>';
        // 進捗バー
        var pct=Math.round(m.prog/m.goal*100);
        body+='<div style="width:100%; height:6px; background:'+t.cardBd+'; border-radius:3px; margin:14px 0 0; overflow:hidden;"><div style="width:'+pct+'%; height:6px; background:'+catColors[cat]+';"></div></div>';
        body+='<p style="font-size:11px; color:'+t.muted+'; margin:6px 0 0;">'+m.prog+' / '+m.goal+'</p>';
      }
      body+='<button id="sheetClose" style="margin:18px 0 0; background:transparent; border:0.5px solid '+t.cardBd+'; color:'+t.sub+'; font-size:13px; padding:11px 30px; border-radius:12px; cursor:pointer;">'+d.close+'</button>';
      $('sheetBody').innerHTML=body;
      $('sheetWrap').style.display="block";
      requestAnimationFrame(function(){ $('sheet').style.transform="translateY(0)"; });
      $('sheetClose').onclick=closeSheet;
      if(m.got) chime(); else lockThud();
    }
    function iconOverlayBig(m,cat){
      var col = m.got ? "#16140F" : (dark?T.dark.muted:T.light.muted);
      return '<i class="ti '+m.ic+'" style="position:absolute; left:50%; top:63%; transform:translate(-50%,-50%); font-size:34px; color:'+col+';"></i>';
    }
    function closeSheet(){
      $('sheet').style.transform="translateY(100%)";
      setTimeout(function(){ $('sheetWrap').style.display="none"; },320);
    }
    $('sheetBg') && ($('sheetBg').onclick=closeSheet);

    function renderCats(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('cats').innerHTML="";
      ["streak","walk","overcome","share"].forEach(function(cat){
        var sec=document.createElement('div');
        sec.style.cssText="margin:20px 0 0;";
        var head='<div style="display:flex; align-items:center; gap:8px; margin:0 0 14px;"><span style="width:8px; height:8px; border-radius:50%; background:'+catColors[cat]+';"></span><p style="font-size:13px; color:'+t.txt+'; margin:0; font-weight:600;">'+d.catTtl[cat]+'</p></div>';
        var grid=document.createElement('div');
        grid.style.cssText="display:flex; flex-wrap:wrap; gap:16px 10px;";
        MEDALS[cat].forEach(function(m){
          var nm=d.names[m.key]||m.key;
          var tile=document.createElement('div');
          tile.style.cssText="display:flex; flex-direction:column; align-items:center; gap:5px; width:78px; cursor:pointer;";
          var badge = m.got ? (m.count? d.times.replace("{n}",m.count) : d.got) : d.remain.replace("{n}",(m.goal-m.prog));
          tile.innerHTML='<div style="position:relative; display:inline-block;'+(m.got?"":" opacity:0.9;")+'">'+medalSVG(m,cat,58)+iconOverlay(m,cat)+'</div>'+
            '<p style="font-size:10px; color:'+(m.got?t.txt:t.sub)+'; margin:0; text-align:center; line-height:1.25;">'+nm+'</p>'+
            '<span style="font-size:9px; color:'+(m.got?t.accent:catColors[cat])+';">'+badge+'</span>';
          tile.onclick=function(){ openSheet(m,cat); };
          grid.appendChild(tile);
        });
        var wrap=document.createElement('div'); wrap.innerHTML=head; wrap.appendChild(grid);
        $('cats').appendChild(wrap);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('streakLbl').textContent=d.streakLbl; $('streakUnit').textContent=d.unit;
      $('nextHint').textContent=d.nextHint; $('totalLbl').textContent=d.total.replace("{n}","6"); $('msg').textContent=d.msg;
      renderCats();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('streakCard').style.background= dark?"linear-gradient(140deg,#221E12,#1A1813)":"linear-gradient(140deg,#FBF3E0,#FBF7F1)"; $('streakCard').style.borderColor= dark?"#3A3220":"#EADCBE";
      $('streakLbl').style.color=t.sub; $('streakUnit').style.color= dark?"#C9C0AE":"#5F5E5A"; $('nextHint').style.color=t.sub; $('totalLbl').style.color=t.sub;
      $('msgCard').style.background= dark?"linear-gradient(135deg,#16241E,#13211C)":"linear-gradient(135deg,#EAF6F1,#E0F0E6)"; $('msgCard').style.borderColor= dark?"#243A30":"#D6EAE0"; $('msg').style.color= dark?"#C9E3D8":"#2E5D4E";
      $('sheet').style.background=t.sheet; $('sheet').style.borderColor=t.sheetBd;
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderCats();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
  })();
</script>
</div>

<script>
(function(){
  /* 戻る矢印（モックの見た目のまま遷移だけ実装） */
  var bk=document.querySelector('i.ti-arrow-left');
  if(!bk) return;
  bk.style.cursor='pointer';
  bk.onclick=function(){ if(document.referrer && history.length>1){ history.back(); } else { REVO.go('home'); } };
})();
</script>
</body>
</html>
