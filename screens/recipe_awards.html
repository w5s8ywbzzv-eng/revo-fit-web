<div class="frame" style="background:#F1EFEA; border-radius:14px; padding:12px; display:flex; justify-content:center;">
<div id="screen" style="background:#16140F; border-radius:20px; font-family:var(--font-sans); max-width:380px; width:100%; margin:0 auto; overflow:hidden; position:relative; transition:background 0.35s;">

  <h2 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;">筋肉飯の表彰台。人気レシピ賞・アイデア賞・投稿数賞・新人賞の1位から3位。分け合う人を称える。新人にも光を当て、獲得したバッジがきらめいてメダルページへつながる。言語と明暗を切り替えられる</h2>

  <div id="hdr" style="display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:0.5px solid #2A2620; transition:border-color 0.35s;">
    <div style="display:flex; align-items:center; gap:11px;">
      <i class="ti ti-arrow-left" style="font-size:21px; color:#8A7E68;" aria-hidden="true"></i>
      <p id="hdrTtl" style="font-size:16px; font-weight:500; color:#F0EBE2; margin:0; transition:color 0.35s;">筋肉飯アワード</p>
    </div>
    <div style="display:flex; align-items:center; gap:9px;">
      <button id="langBtn" aria-label="言語" style="width:32px; height:32px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i class="ti ti-world" style="font-size:16px; color:#B0A488;" aria-hidden="true"></i></button>
      <button id="themeBtn" aria-label="明るさ" style="width:32px; height:32px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i id="themeIcon" class="ti ti-sun" style="font-size:16px; color:#E3C56A;" aria-hidden="true"></i></button>
    </div>
    <div id="langMenu" style="display:none; position:absolute; top:54px; right:18px; width:206px; max-height:300px; overflow-y:auto; background:#1F1C16; border:0.5px solid #3A352A; border-radius:14px; padding:6px; box-shadow:0 18px 40px -12px rgba(0,0,0,0.7); z-index:30;"></div>
  </div>

  <!-- 賞プルダウン -->
  <div style="padding:14px 18px 0;">
    <button id="awardSelect" style="width:100%; display:flex; align-items:center; justify-content:space-between; background:#1A1814; border:0.5px solid #2A2620; border-radius:13px; padding:13px 16px; cursor:pointer; transition:all 0.3s;">
      <span style="display:flex; align-items:center; gap:10px;"><i class="ti ti-trophy" style="font-size:18px; color:#E3C56A;"></i><span id="awardVal" style="font-size:14px; color:#F0EBE2; font-weight:500;">人気レシピ賞</span></span>
      <i id="awardChev" class="ti ti-chevron-down" style="font-size:18px; color:#6E6555;"></i>
    </button>
    <div id="awardMenu" style="display:none; position:absolute; left:18px; right:18px; margin-top:6px; background:#1F1C16; border:0.5px solid #3A352A; border-radius:14px; padding:6px; box-shadow:0 18px 40px -12px rgba(0,0,0,0.7); z-index:25;"></div>
  </div>

  <!-- 賞の説明 -->
  <p id="awardDesc" style="font-size:12px; color:#8A7E68; margin:0; padding:12px 18px 0; line-height:1.6; text-align:center;"></p>

  <!-- 表彰台 -->
  <div style="padding:20px 18px 0;">
    <div id="podium" style="display:flex; align-items:flex-end; justify-content:center; gap:8px;"></div>
  </div>

  <!-- あなたのバッジ（きらめき演出） -->
  <div style="padding:26px 18px 0;">
    <div id="badgeCard" style="background:linear-gradient(140deg,#221E12,#1A1813); border:0.5px solid #3A3220; border-radius:18px; padding:20px; text-align:center; position:relative; overflow:hidden;">
      <div id="sparkleWrap" style="position:relative; display:inline-block; margin:0 0 12px;">
        <div id="badgeMedal"></div>
        <div id="sparkles"></div>
      </div>
      <p id="badgeGot" style="font-size:14px; color:#F0EBE2; margin:0 0 4px; font-weight:600;">バッジを獲得しました</p>
      <p id="badgeName" style="font-size:12px; color:#E3C56A; margin:0 0 16px;">アイデア賞・銅</p>
      <button id="toMedals" style="background:#E3C56A; border:none; color:#16140F; font-size:13px; font-weight:600; padding:11px 24px; border-radius:12px; cursor:pointer; display:inline-flex; align-items:center; gap:7px;"><span id="toMedalsLbl">メダルページで見る</span><i class="ti ti-arrow-right" style="font-size:16px;"></i></button>
    </div>
  </div>

  <!-- 新人へのメッセージ -->
  <div style="padding:14px 18px 0;">
    <div id="rookieCard" style="background:linear-gradient(135deg,#16241E,#13211C); border:0.5px solid #243A30; border-radius:15px; padding:14px 16px; display:flex; align-items:flex-start; gap:10px;">
      <i class="ti ti-plant-2" style="font-size:17px; color:#5DCAA5; margin-top:1px;"></i>
      <p id="rookieMsg" style="font-size:13px; color:#C9E3D8; margin:0; line-height:1.65;">はじめたばかりでも大丈夫。新人賞は、勇気を出して分け合ったあなたのためにあります。</p>
    </div>
  </div>

  <div style="height:22px;"></div>

</div>

    var $=function(id){return document.getElementById(id);}; try{REVO.tint(T);}catch(_e){}
    function renderTabs(){
      var d=D[cur]||D["English"];
      $('awardVal').textContent=d.tabs[activeAward];
    }
    function renderAwardMenu(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var acc= dark?"#E3C56A":"#BA7517", titleCol=t.txt;
      $('awardMenu').innerHTML="";
      AWARDS.forEach(function(a){
        var on=(activeAward===a);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:11px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div style="display:flex; align-items:center; gap:9px;"><span style="width:8px; height:8px; border-radius:50%; background:'+awardColor[a]+';"></span><span style="font-size:13px; color:'+(on?acc:titleCol)+'; font-weight:'+(on?"500":"400")+';">'+d.tabs[a]+'</span></div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(e){ e.stopPropagation(); activeAward=a; $('awardMenu').style.display="none"; $('awardChev').className="ti ti-chevron-down"; renderTabs(); renderDesc(); renderPodium(); renderBadge(); };
        $('awardMenu').appendChild(row);
      });
    }
    function renderDesc(){
      var d=D[cur]||D["English"]; $('awardDesc').textContent=d.desc[activeAward];
    }
    var medalGrad=[["#F5DE93","#C9A24E","#8a6a1e"],["#E8E8EC","#B8B8BE","#888890"],["#EBB98E","#CD8E5A","#8a5a2a"]]; // 金銀銅の[明,主,暗]
    function podiumMedal(rank, size){
      var g=medalGrad[rank], uid="pod"+rank+"_"+activeAward;
      return '<svg viewBox="0 0 80 104" width="'+size+'" height="'+(size*1.3)+'" xmlns="http://www.w3.org/2000/svg">'+
        '<defs><radialGradient id="'+uid+'" cx="38%" cy="30%" r="75%"><stop offset="0%" stop-color="'+g[0]+'"/><stop offset="68%" stop-color="'+g[1]+'"/><stop offset="100%" stop-color="'+g[2]+'"/></radialGradient></defs>'+
        '<path d="M27 5 L40 46 L27 41 Z" fill="'+g[1]+'" opacity="0.9"/><path d="M53 5 L40 46 L53 41 Z" fill="'+g[2]+'" opacity="0.9"/>'+
        '<circle cx="40" cy="67" r="30" fill="url(#'+uid+')" stroke="'+g[0]+'" stroke-width="1.5"/>'+
        '<circle cx="40" cy="67" r="23" fill="none" stroke="'+g[2]+'" stroke-width="1.3" opacity="0.7"/>'+
        '<circle cx="40" cy="67" r="24.5" fill="none" stroke="'+g[0]+'" stroke-width="0.6" opacity="0.6"/>'+
        '<ellipse cx="31" cy="56" rx="9" ry="6" fill="#FFFFFF" opacity="0.3"/>'+
        '<text x="40" y="75" text-anchor="middle" font-size="22" font-weight="700" fill="'+g[2]+'" font-family="Jost,sans-serif" opacity="0.85">'+(rank+1)+'</text>'+
        '</svg>';
    }
    function podiumCol(winner, rank, t, d){
      var heights=[74,54,44]; // 台座の高さ 1,2,3位
      var col=medalCol[rank];
      var order=[1,0,2][rank]; // 中央=1位
      var h=heights[rank];
      var msize=rank===0?70:58;
      return {order:order, html:
        '<div style="display:flex; flex-direction:column; align-items:center; width:100px;">'+
          '<div style="margin:0 0 6px;">'+podiumMedal(rank,msize)+'</div>'+
          '<span style="font-size:15px; margin:0 0 3px;">'+winner.a+'</span>'+
          '<p style="font-size:11px; color:'+t.txt+'; margin:0 0 2px; font-weight:500; text-align:center; max-width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">'+winner.n+'</p>'+
          '<p style="font-size:10px; color:'+awardColor[activeAward]+'; margin:0 0 8px;">'+winner.v+' '+(d.unit[activeAward])+'</p>'+
          '<div style="width:100%; height:'+h+'px; background:linear-gradient(180deg,'+col+'33,'+t.podBg+'); border:0.5px solid '+col+'66; border-top:2px solid '+col+'; border-radius:8px 8px 0 0;"></div>'+
        '</div>'};
    }
    function renderPodium(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var winners=WINNERS[activeAward];
      var cols=winners.map(function(w,i){ return podiumCol(w,i,t,d); });
      cols.sort(function(a,b){ return a.order-b.order; });
      $('podium').innerHTML=cols.map(function(c){return c.html;}).join("");
    }
    function renderBadge(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      // デモ：自分はアイデア賞・銅を獲得したとする（activeが何であれ、その賞の銅を演出）
      var col=awardColor[activeAward];
      var medal='<svg viewBox="0 0 80 104" width="76" height="99" xmlns="http://www.w3.org/2000/svg">'+
        '<defs><radialGradient id="abg" cx="38%" cy="32%" r="75%"><stop offset="0%" stop-color="#F5DE93"/><stop offset="70%" stop-color="'+col+'"/><stop offset="100%" stop-color="#8a5a2a"/></radialGradient></defs>'+
        '<path d="M28 6 L40 44 L28 40 Z" fill="'+col+'" opacity="0.9"/><path d="M52 6 L40 44 L52 40 Z" fill="#8a5a2a" opacity="0.9"/>'+
        '<circle cx="40" cy="66" r="30" fill="url(#abg)" stroke="#F5DE93" stroke-width="1.5"/>'+
        '<circle cx="40" cy="66" r="23" fill="none" stroke="#8a5a2a" stroke-width="1.2" opacity="0.6"/>'+
        '<ellipse cx="31" cy="55" rx="9" ry="6" fill="#FFFFFF" opacity="0.3"/></svg>';
      $('badgeMedal').innerHTML=medal;
      $('badgeMedal').firstChild && $('badgeMedal').firstChild.classList.add('medalPop');
      $('badgeGot').textContent=d.badgeGot;
      $('badgeName').textContent=d.badgeName.replace("{a}",d.tabs[activeAward]).replace("{m}",d.medals[2]);
      $('toMedalsLbl').textContent=d.toMedals;
      // きらめき生成
      spawnSparkles();
    }
    function spawnSparkles(){
      var wrap=$('sparkles'); if(!wrap) return; wrap.innerHTML="";
      var n=10;
      for(var i=0;i<n;i++){
        var ang=(Math.PI*2)*(i/n)+Math.random()*0.4;
        var dist=42+Math.random()*22;
        var dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist - 20;
        var s=document.createElement('div');
        s.style.cssText="position:absolute; left:50%; top:40%; width:6px; height:6px; border-radius:50%; background:#F0D98A; pointer-events:none; --dx:"+dx+"px; --dy:"+dy+"px; animation:sparkFly 1s ease-out forwards; animation-delay:"+(Math.random()*0.3)+"s; box-shadow:0 0 6px #E3C56A;";
        wrap.appendChild(s);
      }
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('rookieMsg').textContent=d.rookie;
      renderTabs(); renderDesc(); renderPodium(); renderBadge();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('awardDesc').style.color=t.sub;
      $('awardSelect').style.background=t.card; $('awardSelect').style.borderColor=t.cardBd;
      $('awardVal').style.color=t.txt;
      $('awardMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('awardMenu').style.borderColor= dark?"#3A352A":"#E8E0CE";
      $('badgeCard').style.background= dark?"linear-gradient(140deg,#221E12,#1A1813)":"linear-gradient(140deg,#FBF3E0,#FBF7F1)"; $('badgeCard').style.borderColor= dark?"#3A3220":"#EADCBE";
      $('badgeGot').style.color=t.txt;
      $('toMedals').style.background=t.accent; $('toMedals').style.color= dark?"#16140F":"#FFFFFF";
      $('rookieCard').style.background= dark?"linear-gradient(135deg,#16241E,#13211C)":"linear-gradient(135deg,#EAF6F1,#E0F0E6)"; $('rookieCard').style.borderColor= dark?"#243A30":"#D6EAE0"; $('rookieMsg').style.color= dark?"#C9E3D8":"#2E5D4E";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderTabs(); renderPodium();
    }
    $('awardSelect').onclick=function(e){ e.stopPropagation(); var open=($('awardMenu').style.display==="block"); if(open){ $('awardMenu').style.display="none"; $('awardChev').className="ti ti-chevron-down"; } else { renderAwardMenu(); $('awardMenu').style.display="block"; $('awardChev').className="ti ti-chevron-up"; $('langMenu').style.display="none"; } };
    $('awardMenu').onclick=function(e){ e.stopPropagation(); };
    $('toMedals').onclick=function(){ spawnSparkles(); var mp=$('badgeMedal').firstChild; if(mp){ mp.classList.remove('medalPop'); void mp.offsetWidth; mp.classList.add('medalPop'); } };
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; REVO.setLang(l); $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; REVO.setDark(dark); applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; $('awardMenu').style.display="none"; $('awardChev').className="ti ti-chevron-down"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
  })();
</script>
</div>

<script>
(function(){
  /* 戻る矢印（モックの見た目のまま遷移だけ実装） */
  var bk=document.querySelector('i.ti-arrow-left');
  if(!bk) return;
  bk.style.cursor='pointer';
  bk.onclick=function(){ if(document.referrer && history.length>1){ history.back(); } else { REVO.go('recipes'); } };
})();
</script>
</body>
</html>
