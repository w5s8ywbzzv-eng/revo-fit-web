  <h2 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;">おすすめを投稿する。ジャンルと国を選び、なければ新しく作れる。商品名、お店やメーカー、価格帯、ひとことを添えて。世界中のあなたの一票が、生きたランキングを育てます。言語と明暗を切り替えられる</h2>

      <p id="hdrTtl" style="font-size:16px; font-weight:500; color:#F0EBE2; margin:0; transition:color 0.35s;">おすすめを投稿</p>
    </div>
    <div style="display:flex; align-items:center; gap:9px;">
      <button id="langBtn" aria-label="言語" style="width:32px; height:32px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i class="ti ti-world" style="font-size:16px; color:#B0A488;" aria-hidden="true"></i></button>
      <button id="themeBtn" aria-label="明るさ" style="width:32px; height:32px; border-radius:50%; background:#1F1C16; border:0.5px solid #3A352A; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.35s;"><i id="themeIcon" class="ti ti-sun" style="font-size:16px; color:#E3C56A;" aria-hidden="true"></i></button>
    </div>
    <div id="langMenu" style="display:none; position:absolute; top:54px; right:18px; width:206px; max-height:300px; overflow-y:auto; background:#1F1C16; border:0.5px solid #3A352A; border-radius:14px; padding:6px; box-shadow:0 18px 40px -12px rgba(0,0,0,0.7); z-index:30;"></div>
  </div>

  <div style="padding:16px 18px 24px; max-height:600px; overflow-y:auto;">
    <p id="lead" style="font-size:12px; color:#8A7E68; margin:0 0 20px; line-height:1.6;">あなたの一票が、その国の生きたランキングを育てます。</p>

    <!-- ジャンル -->

      <label id="lblGenre" style="font-size:12px; color:#B0A488; font-weight:500; display:block; margin:0 0 8px;">ジャンル</label>

          <i class="ti ti-chevron-down" style="font-size:16px; color:#8A7E68;"></i>
        </button>
        <div id="genreMenu" style="display:none; position:absolute; left:0; right:0; top:52px; background:#1F1C16; border:0.5px solid #3A352A; border-radius:12px; padding:6px; box-shadow:0 14px 34px -10px rgba(0,0,0,0.7); z-index:20;"></div>
      </div>
    </div>

      </div>
    </div>

    </div>

    <!-- 店・メーカー／ブランド -->
    <div style="margin:0 0 18px;">
      <label id="lblBrand" style="font-size:12px; color:#B0A488; font-weight:500; display:block; margin:0 0 8px;">お店・メーカー／ブランド</label>
      <input id="inBrand" type="text" placeholder="例：セブン-イレブン、明治、Gymshark" style="width:100%; box-sizing:border-box; background:#1A1814; border:0.5px solid #2A2620; border-radius:12px; padding:13px 14px; font-size:13px; color:#F0EBE2; font-family:inherit; outline:none;">
    </div>

    <div style="margin:0 0 18px;">

    <div style="margin:0 0 18px;">
      <label id="lblRate" style="font-size:12px; color:#B0A488; font-weight:500; display:block; margin:0 0 4px;">評価（このジャンルの見どころ）</label>

    </div>

    <div style="margin:0 0 18px;">

    <div style="margin:0 0 22px;">

        <span id="photoLbl" style="font-size:12px; color:#8A7E68;">写真を追加</span>

    <button id="submitBtn" style="width:100%; background:#E3C56A; border:none; color:#16140F; font-size:15px; font-weight:600; padding:15px; border-radius:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;"><i class="ti ti-send" style="font-size:17px;"></i><span id="submitLbl">投稿する</span></button>

  </div>

</div>

      d.prices.forEach(function(pl,i){
        var on=(selPrice===i);
        var chip=document.createElement('span');
        chip.style.cssText="flex:1; text-align:center; font-size:12px; padding:10px; border-radius:11px; cursor:pointer; "+(on?"background:"+(dark?"#221E14":"#FBF3E0")+"; color:"+t.accent+"; border:1px solid "+t.accent+"; font-weight:600;":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";");
        chip.textContent=pl;
        chip.onclick=function(){ selPrice=i; renderPrice(); };
        $('priceChips').appendChild(chip);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      var g=GENRES[selGenre], cc=COUNTRIES[selCountry];
      $('hdrTtl').textContent=d.hdr; $('lead').textContent=d.lead;
      $('lblGenre').textContent=d.lblGenre; $('lblCountry').textContent=d.lblCountry;
      $('lblName').textContent=d.lblName; $('lblBrand').textContent=d.lblBrand;
      $('lblPrice').textContent=d.lblPrice; $('lblVoice').textContent=d.lblVoice; $('lblPhoto').textContent=d.lblPhoto;
      if($('lblRate')) $('lblRate').textContent=d.lblRate; if($('rateHint')) $('rateHint').textContent=d.rateHint;
      $('genreIc').className="ti "+g.ic; $('genreVal').textContent=d.genres[g.k];
      $('countryVal').textContent=d.countries[cc];
      $('inName').placeholder=d.phName; $('inBrand').placeholder=d.phBrand; $('inVoice').placeholder=d.phVoice;
      $('photoLbl').textContent=d.photo; $('submitLbl').textContent=d.submit;
      $('thanks').textContent=d.thanks; $('foot').textContent=d.foot;
      renderPrice(); renderAxes();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.title;
      $('lead').style.color=t.sub; $('foot').style.color=t.muted;
      ["lblGenre","lblCountry","lblName","lblBrand","lblPrice","lblVoice","lblPhoto","lblRate"].forEach(function(id){ if($(id)) $(id).style.color=t.lbl; });
      if($('rateHint')) $('rateHint').style.color=t.muted;
      ["genreBtn","countryBtn"].forEach(function(id){ $(id).style.background=t.field; $(id).style.borderColor=t.fieldBd; });
      $('genreVal').style.color=t.txt; $('countryVal').style.color=t.txt;
      ["inName","inBrand","inVoice"].forEach(function(id){ $(id).style.background=t.field; $(id).style.borderColor=t.fieldBd; $(id).style.color=t.txt; });
      $('photoBtn').style.background=t.field; $('photoBtn').style.borderColor=t.chipBd; $('photoLbl').style.color=t.sub;
      $('photoBtn').querySelector('i').style.color=t.sub;
      $('submitBtn').style.background=t.accent; $('submitBtn').style.color= dark?"#16140F":"#FFFFFF";
      [$('genreMenu'),$('countryMenu')].forEach(function(m){ m.style.background=t.menu; m.style.borderColor=t.menuBd; });
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background=t.menu; $('langMenu').style.borderColor=t.menuBd;
      applyUI();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    function closeAll(){ $('langMenu').style.display="none"; $('genreMenu').style.display="none"; $('countryMenu').style.display="none"; }
    $('langBtn').onclick=function(e){ e.stopPropagation(); closeAll(); renderMenu(); $('langMenu').style.display="block"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    $('genreBtn').onclick=function(e){ e.stopPropagation(); var open=$('genreMenu').style.display==="block"; closeAll(); if(!open){ renderGenreMenu(); $('genreMenu').style.display="block"; } };
    $('countryBtn').onclick=function(e){ e.stopPropagation(); var open=$('countryMenu').style.display==="block"; closeAll(); if(!open){ renderCountryMenu(); $('countryMenu').style.display="block"; } };
    $('genreMenu').onclick=function(e){ e.stopPropagation(); };
    $('countryMenu').onclick=function(e){ e.stopPropagation(); };
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    $('submitBtn').onclick=function(){ $('thanks').style.display="block"; };
    document.addEventListener('click', closeAll);
    applyTheme();
  })();
</script>
</div>
