      var d=D[cur]||D["English"], t=dark?T.dark:T.light;

        var key=m[0], food=m[1], supp=m[2], est=m[3], total=food+supp;

          '<div style="display:flex; align-items:baseline; justify-content:space-between; margin:0 0 6px;">'+

          '<div style="display:flex; height:7px; border-radius:4px; overflow:hidden; background:'+t.track+';">'+

        ? '<span style="font-size:9px; color:#5DCAA5; background:'+(dark?"#16241E":"#EAF6F1")+'; padding:2px 8px; border-radius:999px;"><i class="ti ti-check" style="font-size:10px; vertical-align:-1px;"></i> '+(d.crToday||"Today")+'</span>'

      var noteTxt = note==="load"
        ? '<p style="font-size:10px; color:'+(dark?"#B0A488":"#9A8E78")+'; margin:5px 0 0;">'+(d.crLoadDays||"{n} days to full").replace("{n}",2)+'</p>'

      return '<div>'+
        '<div style="display:flex; align-items:center; justify-content:space-between; margin:0 0 6px;">'+
          '<span style="font-size:13px; color:'+t.txt+';">'+name+'</span>'+

    function renderSuppGroup(containerId, btnSummaryId, chevronId, list, isOpen){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var taken=list.filter(function(x){return x[2];}).length;
      $(btnSummaryId).textContent=(d.suppSummary||"{a}/{b}").replace("{a}",taken).replace("{b}",list.length);
      $(containerId).style.display = isOpen ? "flex" : "none";
      $(chevronId).className = isOpen ? "ti ti-chevron-up" : "ti ti-chevron-down";
      $(containerId).innerHTML="";
      list.forEach(function(sp){
        var row=document.createElement('div');
        row.innerHTML=suppRowHtml(d,t,sp[0],sp[1],sp[2],sp[3]);
        $(containerId).appendChild(row);
      });
    }
    function renderSupps(){
      var d=D[cur]||D["English"];
      $('begLbl').textContent=d.grpBeginner||"For beginners";

      renderSuppGroup('trSupps','trSummary','trChevron',TR_SUPPS,trOpen);

      [$('begBtn'),$('trBtn')].forEach(function(b){ b.style.background=t.card; b.style.borderColor=t.cardBd; });
      $('begLbl').style.color=t.txt; $('trLbl').style.color=t.txt;
      $('suppHint').style.color=t.muted;

    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";

        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('begBtn').onclick=function(){ begOpen=!begOpen; renderSupps(); };
    $('trBtn').onclick=function(){ trOpen=!trOpen; renderSupps(); };
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
  })();
