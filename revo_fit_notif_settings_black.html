<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<div style="background:#0E0D0A; border-radius:14px; padding:22px; display:flex; justify-content:center; font-family:'Jost',sans-serif;">
<div style="max-width:400px; width:100%;">

  <p style="font-size:12px; color:#8A7E68; margin:0 0 4px; letter-spacing:0.1em; text-transform:uppercase;">Revo Fit</p>
  <h1 style="font-size:19px; color:#F0EBE2; font-weight:400; margin:0 0 22px;">アプリアイコン 試案</h1>

  <!-- 案A: r 一文字 -->
  <div style="display:flex; align-items:center; gap:16px; margin:0 0 20px; padding:14px; background:#16140F; border:0.5px solid #2A2620; border-radius:16px;">
    <svg width="76" height="76" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <defs><clipPath id="sq"><rect width="180" height="180" rx="40"/></clipPath></defs>
      <g clip-path="url(#sq)">
        <rect width="180" height="180" fill="#16140F"/>
        <text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="112" fill="#E3C56A">r</text>
      </g>
      <rect x="0.5" y="0.5" width="179" height="179" rx="40" fill="none" stroke="#2A2620" stroke-width="1"/>
    </svg>
    <div>
      <p style="font-size:14px; color:#F0EBE2; font-weight:500; margin:0 0 3px;">案A ― r 一文字</p>
      <p style="font-size:12px; color:#8A7E68; margin:0; line-height:1.5;">ロゴと完全一致。潔く、小さくても視認性が高い。</p>
    </div>
  </div>

  <!-- 案B: r + 円環（巡る） -->
  <div style="display:flex; align-items:center; gap:16px; margin:0 0 20px; padding:14px; background:#16140F; border:0.5px solid #2A2620; border-radius:16px;">
    <svg width="76" height="76" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <g clip-path="url(#sq)">
        <rect width="180" height="180" fill="#16140F"/>
        <circle cx="90" cy="90" r="52" fill="none" stroke="#E3C56A" stroke-width="4" stroke-linecap="round" stroke-dasharray="245 82" transform="rotate(-90 90 90)"/>
        <text x="90" y="92" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="86" fill="#F0EBE2">r</text>
      </g>
      <rect x="0.5" y="0.5" width="179" height="179" rx="40" fill="none" stroke="#2A2620" stroke-width="1"/>
    </svg>
    <div>
      <p style="font-size:14px; color:#F0EBE2; font-weight:500; margin:0 0 3px;">案B ― r + 円環</p>
      <p style="font-size:12px; color:#8A7E68; margin:0; line-height:1.5;">Revo＝巡る・変わるを金の弧で。意味と視認性。</p>
    </div>
  </div>

  <!-- 案C: revo 縦 -->
  <div style="display:flex; align-items:center; gap:16px; margin:0 0 20px; padding:14px; background:#16140F; border:0.5px solid #2A2620; border-radius:16px;">
    <svg width="76" height="76" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <g clip-path="url(#sq)">
        <rect width="180" height="180" fill="#16140F"/>
        <text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="42" letter-spacing="2" fill="#F0EBE2">revo</text>
        <rect x="62" y="118" width="56" height="3" rx="1.5" fill="#E3C56A"/>
      </g>
      <rect x="0.5" y="0.5" width="179" height="179" rx="40" fill="none" stroke="#2A2620" stroke-width="1"/>
    </svg>
    <div>
      <p style="font-size:14px; color:#F0EBE2; font-weight:500; margin:0 0 3px;">案C ― revo ロゴタイプ</p>
      <p style="font-size:12px; color:#8A7E68; margin:0; line-height:1.5;">ロゴそのまま。金の下線がアクセント。小さいと細めか。</p>
    </div>
  </div>

  <!-- 案D: r 金地反転 -->
  <div style="display:flex; align-items:center; gap:16px; margin:0 0 20px; padding:14px; background:#16140F; border:0.5px solid #2A2620; border-radius:16px;">
    <svg width="76" height="76" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <defs><linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EAD07E"/><stop offset="1" stop-color="#D4B052"/></linearGradient></defs>
      <g clip-path="url(#sq)">
        <rect width="180" height="180" fill="url(#gold)"/>
        <text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="300" font-size="112" fill="#16140F">r</text>
      </g>
      <rect x="0.5" y="0.5" width="179" height="179" rx="40" fill="none" stroke="#00000022" stroke-width="1"/>
    </svg>
    <div>
      <p style="font-size:14px; color:#F0EBE2; font-weight:500; margin:0 0 3px;">案D ― 金地に黒 r（反転）</p>
      <p style="font-size:12px; color:#8A7E68; margin:0; line-height:1.5;">金が主役。ホーム画面で目立つ。高級感。</p>
    </div>
  </div>

  <!-- 案E: r + 上昇の弧（成長） -->
  <div style="display:flex; align-items:center; gap:16px; margin:0 0 26px; padding:14px; background:#16140F; border:0.5px solid #2A2620; border-radius:16px;">
    <svg width="76" height="76" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <g clip-path="url(#sq)">
        <rect width="180" height="180" fill="#16140F"/>
        <path d="M40 120 Q90 40 140 70" fill="none" stroke="#E3C56A" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
        <text x="90" y="98" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="82" fill="#F0EBE2">r</text>
      </g>
      <rect x="0.5" y="0.5" width="179" height="179" rx="40" fill="none" stroke="#2A2620" stroke-width="1"/>
    </svg>
    <div>
      <p style="font-size:14px; color:#F0EBE2; font-weight:500; margin:0 0 3px;">案E ― r + 上昇の弧</p>
      <p style="font-size:12px; color:#8A7E68; margin:0; line-height:1.5;">成長・前進を弧で。動きのニュアンス。</p>
    </div>
  </div>

  <!-- ホーム画面イメージ -->
  <p style="font-size:12px; color:#8A7E68; margin:0 0 12px; letter-spacing:0.05em;">スマホのホーム画面で見ると（案A・B・D）</p>
  <div style="display:flex; gap:22px; padding:20px; background:linear-gradient(160deg,#2A2A35,#1A1A22); border-radius:20px; justify-content:center;">
    <div style="text-align:center;">
      <svg width="58" height="58" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="display:block; margin:0 auto 6px;">
        <g clip-path="url(#sq)"><rect width="180" height="180" fill="#16140F"/><text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="112" fill="#E3C56A">r</text></g>
      </svg>
      <span style="font-size:10px; color:#E8E8EC;">Revo Fit</span>
    </div>
    <div style="text-align:center;">
      <svg width="58" height="58" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="display:block; margin:0 auto 6px;">
        <g clip-path="url(#sq)"><rect width="180" height="180" fill="#16140F"/><circle cx="90" cy="90" r="52" fill="none" stroke="#E3C56A" stroke-width="4" stroke-linecap="round" stroke-dasharray="245 82" transform="rotate(-90 90 90)"/><text x="90" y="92" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="200" font-size="86" fill="#F0EBE2">r</text></g>
      </svg>
      <span style="font-size:10px; color:#E8E8EC;">Revo Fit</span>
    </div>
    <div style="text-align:center;">
      <svg width="58" height="58" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="display:block; margin:0 auto 6px;">
        <defs><linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EAD07E"/><stop offset="1" stop-color="#D4B052"/></linearGradient></defs>
        <g clip-path="url(#sq)"><rect width="180" height="180" fill="url(#gold2)"/><text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="Jost,sans-serif" font-weight="300" font-size="112" fill="#16140F">r</text></g>
      </svg>
      <span style="font-size:10px; color:#E8E8EC;">Revo Fit</span>
    </div>
  </div>

</div>
