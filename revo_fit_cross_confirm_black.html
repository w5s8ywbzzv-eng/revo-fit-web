      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var arr= scope==="nat"?PROD_NAT:PROD_WLD;
      $('prodRank').innerHTML="";
      // 1位から全部ぼかし。実データ行もぼかして「何かある」気配だけ残す
      arr.forEach(function(p,i){
        var row=document.createElement('div');
        row.style.cssText="background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:12px; filter:blur(5px); opacity:0.6;";
        row.innerHTML=
          '<span style="font-size:16px; font-weight:700; color:'+(medal[i]||t.sub)+'; width:20px; text-align:center; font-family:Jost,sans-serif;">'+p.rank+'</span>'+
          '<div style="flex:1; min-width:0;">'+
            '<p style="font-size:13px; color:'+t.txt+'; margin:0 0 2px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">'+p.name+'</p>'+
            '<p style="font-size:11px; color:'+t.sub+'; margin:0;">'+p.flavor+'</p>'+
          '</div>'+
          '<div style="display:flex; align-items:center; gap:3px;"><i class="ti ti-star-filled" style="font-size:13px; color:'+t.accent+';"></i><span style="font-size:13px; color:'+t.txt+'; font-weight:600;">'+p.rate+'</span></div>';
        $('prodRank').appendChild(row);
      });
      // さらにダミー行（4〜7位ぶん）
      for(var k=0;k<4;k++){
        var dum=document.createElement('div');
        dum.style.cssText="background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:12px; filter:blur(5px); opacity:0.5;";
        dum.innerHTML=
          '<span style="font-size:16px; font-weight:700; color:'+t.sub+'; width:20px; text-align:center; font-family:Jost,sans-serif;">'+(k+4)+'</span>'+
          '<div style="flex:1;"><div style="width:'+(60-k*6)+'%; height:11px; background:'+t.track+'; border-radius:4px; margin:0 0 5px;"></div><div style="width:'+(40-k*4)+'%; height:9px; background:'+t.track+'; border-radius:4px;"></div></div>'+
          '<div style="width:34px; height:13px; background:'+t.track+'; border-radius:4px;"></div>';
        $('prodRank').appendChild(dum);
      }
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr;
      var reg=regions.filter(function(r){return r.code===curRegion;})[0]||regions[0];
      var regName = (cur==="日本語"||cur==="简体中文"||cur==="繁體中文"||cur==="한국어"||cur==="ภาษาไทย"||cur==="हिन्दी") ? reg.name : reg.en;
      $('natTab').textContent=(d.natTab||"{c}").replace("{c}", regName);
      $('wldTab').textContent=d.wldTab;
      $('freeTtl').textContent=d.freeTtl; $('prodTtl').textContent=d.prodTtl;
      $('stdBadge').textContent=d.std; $('lockTxt').textContent=d.lock; $('unlockBtn').textContent=d.unlock; $('lockSub').textContent=d.lockSub;
      renderFree(); renderProd();
    }
    function setScope(sc){
      scope=sc;
      var nOn=(sc==="nat");
      applyTheme();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('scopeBar').style.background=t.card; $('scopeBar').style.borderColor=t.cardBd;
      var nOn=(scope==="nat");
      $('natTab').style.background=nOn?t.accent:"transparent"; $('natTab').style.color=nOn?(dark?"#16140F":"#FFFFFF"):t.sub;
      $('wldTab').style.background=!nOn?t.accent:"transparent"; $('wldTab').style.color=!nOn?(dark?"#16140F":"#FFFFFF"):t.sub;
      $('freeTtl').style.color=t.txt; $('prodTtl').style.color=t.txt;
      $('stdBadge').style.color=t.accent; $('stdBadge').style.borderColor=t.accent;
      $('lockTxt').style.color=t.txt; $('lockSub').style.color=t.sub;
      $('unlockBtn').style.background=t.accent; $('unlockBtn').style.color= dark?"#16140F":"#FFFFFF";
      $('lockOverlay').style.background="linear-gradient(180deg, "+(dark?"rgba(22,20,15,0)":"rgba(255,255,255,0)")+" 0%, "+(dark?"rgba(22,20,15,0.82)":"rgba(255,255,255,0.82)")+" 42%, "+(dark?"rgba(22,20,15,0.97)":"rgba(255,255,255,0.97)")+" 100%)";
      [$('langBtn'),$('themeBtn'),$('regionBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('regionBtn').querySelector('i').style.color=t.iconCol;
      $('regionMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('regionMenu').style.borderColor=t.iconBd;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderFree(); renderProd();
    }
    $('natTab').onclick=function(){ setScope("nat"); };
    $('wldTab').onclick=function(){ setScope("wld"); };
    function renderRegionMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('regionMenu').innerHTML="";
      var localName=(cur==="日本語"||cur==="简体中文"||cur==="繁體中文"||cur==="한국어"||cur==="ภาษาไทย"||cur==="हिन्दी");
      regions.forEach(function(r){
        var on=(r.code===curRegion);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        var nm = localName ? r.name : r.en;
        var sub = (r.name!==r.en && nm!==r.en) ? '<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+r.en+'</p>' : '';
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+nm+'</p>'+sub+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ curRegion=r.code; $('regionMenu').style.display="none"; applyUI(); applyTheme(); };
        $('regionMenu').appendChild(row);
      });
    }
    $('regionBtn').onclick=function(e){ e.stopPropagation(); renderRegionMenu(); var m=$('regionMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; $('langMenu').style.display="none"; };
    $('regionMenu').onclick=function(e){ e.stopPropagation(); };
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; $('regionMenu').style.display="none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; $('regionMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI(); applyTheme();
  })();
</script>
</div>
