        var preview='<div style="margin:11px 0 0; padding:10px 12px; background:'+t.preview+'; border-radius:10px; display:flex; align-items:flex-start; gap:8px;">'+
          '<div style="width:20px; height:20px; border-radius:5px; background:'+t.accent+'; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><span style="font-size:11px; color:'+(dark?"#16140F":"#FFFFFF")+'; font-weight:700; font-family:Jost;">R</span></div>'+
          '<div style="flex:1;"><p style="font-size:10px; color:'+t.muted+'; margin:0 0 2px;">revo fit</p><p style="font-size:12px; color:'+t.txt+'; margin:0; line-height:1.5;">'+d.t[ty.key][1]+'</p></div></div>';
        card.innerHTML=head+preview;
        var tglEl=card.querySelector('.tgl');
        tglEl.onclick=function(e){ e.stopPropagation(); ty.on=!ty.on; renderList(); };
        $('notifList').appendChild(card);
      });
    }
    function renderMaster(){
      var t=dark?T.dark:T.light;
      var m=$('masterTgl');
      m.style.background= masterOn? t.accent : t.off;
      m.querySelector('.knob').style.left= masterOn? "21px":"2px";
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('masterLbl').textContent=d.masterLbl; $('masterSub').textContent=d.masterSub;
      $('detailLbl').textContent=d.detailLbl; $('noteTxt').textContent=d.note;
      renderMaster(); renderList();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('masterRow').style.background= dark?"linear-gradient(140deg,#221E12,#1A1813)":"linear-gradient(140deg,#FBF3E0,#FBF7F1)"; $('masterRow').style.borderColor= dark?"#3A3220":"#EADCBE";
      $('masterLbl').style.color=t.txt; $('detailLbl').style.color=t.sub;
      $('noteCard').style.background=t.note; $('noteTxt').style.color=t.noteTx; $('noteCard').querySelector('i').style.color= dark?"#5DCAA5":"#3E8068";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      applyUI();
    }
    $('masterTgl').onclick=function(){ masterOn=!masterOn; renderMaster(); renderList(); };
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyTheme();
  })();
</script>
</div>
