        var opacity = st==="active" ? "1" : "0.82";
        var card=document.createElement('div');
        card.style.cssText="display:flex; align-items:center; gap:10px; background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:12px; padding:11px 12px; opacity:"+opacity+";";
        card.innerHTML=iconInner+
          '<div style="flex:1; min-width:0;"><p style="font-size:12px; color:'+t.head+'; margin:0 0 3px; font-weight:600; font-family:Jost;">'+(st==="idea"?badgeTxt:"revo "+svc)+'</p>'+(st==="idea"?'':'<span style="font-size:9px; color:'+badgeCol+'; background:'+badgeBg+'; padding:2px 7px; border-radius:5px; font-weight:600;">'+badgeTxt+'</span>')+'</div>';
        $('famGrid').appendChild(card);
      });
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('curPlanBadge').textContent=d.cur;
      $('manageLbl').textContent=d.manage; $('cancelTxt').textContent=d.cancel; $('priceNote').textContent=d.priceNote;
      $('tabMonthBtn').textContent=d.tabMonth; $('tabYearBtn').textContent=d.tabYear; $('saveNote').textContent=d.saveLbl;
      setCycle(cycle);
      renderFamily();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.head;
      $('curPlanBadge').style.background=t.free; $('curPlanBadge').style.borderColor=t.freeBd; $('curPlanBadge').style.color=t.check;
      $('manageRow').style.background=t.card;
      $('cancelTxt').style.color=t.sub; $('cancelNote').querySelector('i').style.color=t.check;
      $('priceNote').style.color=t.muted;
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      $('cycleToggle').style.background=t.card; $('cycleToggle').style.borderColor=t.cardBd;
      applyUI();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    $('tabMonthBtn').onclick=function(){ setCycle("month"); };
    $('tabYearBtn').onclick=function(){ setCycle("year"); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    function planSelect(key){
      var d=D[cur]||D["English"];
      var msg = key==="cross" ? d.toConfirm : d.toSelect;
      var tp=$('planToast'); tp.textContent=msg; tp.style.opacity="1"; tp.style.transform="translateX(-50%) translateY(0)";
      clearTimeout(tp._h); tp._h=setTimeout(function(){ tp.style.opacity="0"; tp.style.transform="translateX(-50%) translateY(8px)"; }, 2400);
    }
    applyTheme();
  })();
</script>
</div>
