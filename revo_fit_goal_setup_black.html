          '</div>'
        : '';
      var nutToggle='<button class="nutBtn" style="width:100%; background:transparent; border:none; color:'+t.sub+'; font-size:11px; cursor:pointer; padding:9px 0 2px; display:flex; align-items:center; justify-content:center; gap:5px;">'+(foodOpen.nut?d.nutClose:d.nutMore)+'<i class="ti ti-chevron-'+(foodOpen.nut?"up":"down")+'" style="font-size:14px;"></i></button>';
      // 収支
      var balance=
        '<div style="background:'+(dark?"#16241E":"#EAF6F1")+'; border-radius:13px; padding:13px 15px; margin:6px 0 0;">'+
          '<div style="display:flex; align-items:center; justify-content:space-between;">'+
            '<span style="font-size:13px; color:'+(dark?"#7FCBAE":"#0F6E56")+'; font-weight:500;">'+d.foodBalance+'</span>'+
            '<span style="font-size:20px; font-weight:600; color:'+(dark?"#5DCAA5":"#0F9E84")+';">+'+room+' <span style="font-size:11px; font-weight:400;">kcal</span></span>'+
          '</div>'+
          '<div style="display:flex; align-items:center; gap:5px; font-size:10px; color:'+(dark?"#5F8A78":"#4E8A72")+'; flex-wrap:wrap; margin:7px 0 0;">'+
            '<span>'+d.foodBmr+' '+bmr.toLocaleString()+'</span><span>＋</span><span>'+d.foodMove+' '+move+'</span><span>−</span><span>'+d.foodEaten+' '+eaten+'</span>'+
          '</div>'+
        '</div>';
      return entries+meals+pfc+dietRow+balance+nutToggle+nutDetail;
    }
    function nutLine(t,lbl,val){
      return '<div style="display:flex; align-items:center; justify-content:space-between;"><span style="font-size:12px; color:'+t.sub+';">'+lbl+'</span><span style="font-size:13px; color:'+t.cardName+'; font-weight:500;">'+val+'</span></div>';
    }
    function mealRow(t,name,kcal,approx,d){
      var badge = approx ? '<span style="font-size:9px; color:'+(dark?"#B0A488":"#9A8E78")+'; background:'+(dark?"#211D16":"#F0EAE0")+'; padding:2px 7px; border-radius:999px; margin-left:6px;">'+d.foodApprox+'</span>' : '';
      return '<div style="display:flex; align-items:center; justify-content:space-between; background:'+t.chip+'; border:0.5px solid '+t.chipBd+'; border-radius:11px; padding:10px 13px;">'+
        '<span style="font-size:12px; color:'+t.cardName+';">'+name+badge+'</span>'+
        '<span style="font-size:13px; color:'+t.accent+'; font-weight:500;">'+kcal+'<span style="font-size:9px; color:'+t.sub+'; font-weight:400;"> kcal</span></span>'+
      '</div>';
    }
    function mealRowEmpty(t,name){
      return '<div style="display:flex; align-items:center; justify-content:space-between; background:transparent; border:0.5px dashed '+(dark?"#3A352A":"#E0DACE")+'; border-radius:11px; padding:10px 13px;">'+
        '<span style="font-size:12px; color:'+t.muted+';">'+name+'</span>'+
        '<i class="ti ti-plus" style="font-size:14px; color:'+t.muted+';" aria-hidden="true"></i>'+
      '</div>';
    }
    function renderGroups(){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      $('groups').innerHTML="";
      ITEMS.forEach(function(it){
        var key=it.key, isOpen=!!open[key];
        var wrap=document.createElement('div');
        var chip=document.createElement('button');
        chip.style.cssText="width:100%; display:flex; align-items:center; gap:12px; background:"+t.card+"; border:0.5px solid "+t.cardBd+"; border-radius:15px; padding:14px 15px; cursor:pointer; text-align:left;";
        var statusBadge = it.done
          ? '<span style="font-size:10px; color:'+t.doneCol+'; background:'+t.doneBg+'; padding:4px 10px; border-radius:999px;"><i class="ti ti-check" style="font-size:11px; vertical-align:-1px;"></i> '+d.done+'</span>'
          : '<span style="font-size:10px; color:'+t.muted+'; background:'+t.yetBg+'; padding:4px 10px; border-radius:999px;">'+d.yet+'</span>';
        var sub = it.done ? '<p style="font-size:11px; color:'+t.sub+'; margin:2px 0 0;">'+valOf(key)+'</p>' : '';
        chip.innerHTML=
          '<div style="width:42px; height:42px; border-radius:12px; background:'+(dark?"#211D16":"#FFFFFF")+'; border:0.5px solid '+t.cardBd+'; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><i class="ti '+it.icon+'" style="font-size:22px; color:'+it.col+';" aria-hidden="true"></i></div>'+
          '<div style="flex:1;"><p style="font-size:14px; color:'+t.cardName+'; margin:0; font-weight:500;">'+d.names[key]+'</p>'+sub+'</div>'+
          statusBadge+
          '<i class="ti ti-chevron-'+(isOpen?"up":"down")+'" style="font-size:17px; color:'+t.muted+'; margin-left:4px;" aria-hidden="true"></i>';
        chip.onclick=function(){ open[key]=!open[key]; renderGroups(); };
        wrap.appendChild(chip);
        if(isOpen){
          var box=document.createElement('div');
          box.style.cssText="background:"+t.open+"; border:0.5px solid "+t.openBd+"; border-top:none; border-radius:0 0 15px 15px; margin:-6px 7px 0; padding:16px 15px 14px;";
          if(key==="sleep") box.innerHTML=sleepInner(t);
          else if(key==="food") box.innerHTML=foodInner(t);
          else if(key==="move") box.innerHTML=moveInner(t);
          else if(key==="body") box.innerHTML=bodyInner(t);
          else if(key==="water") box.innerHTML=waterInner(t);
          else if(key==="condition") box.innerHTML=conditionInner(t);
          wrap.appendChild(box);
        }
        $('groups').appendChild(wrap);
      });
      // 食事内インタラクション
      document.querySelectorAll('.nutBtn').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); foodOpen.nut=!foodOpen.nut; renderGroups(); }; });
      document.querySelectorAll('.dietChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); var d=D[cur]||D["English"]; d.dietSel=+b.getAttribute('data-i'); renderGroups(); }; });
      document.querySelectorAll('.condBowelChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); var p=b.parentNode; p.querySelectorAll('.condBowelChip').forEach(function(x){ x.style.background=(dark?"#1F1C16":"#FFFFFF"); x.style.color=(dark?"#A89C84":"#5F5E5A"); x.style.border="0.5px solid "+(dark?"#3A352A":"#E0DACE"); }); b.style.background=(dark?"#2E1E26":"#FBEEF4"); b.style.color="#E89BB8"; b.style.border="1.5px solid #C97AA0"; }; });
      document.querySelectorAll('.condMoodChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); var acc=dark?"#E3C56A":"#1D9E75"; var p=b.parentNode; p.querySelectorAll('.condMoodChip').forEach(function(x){ x.style.background=(dark?"#1F1C16":"#FFFFFF"); x.style.color=(dark?"#A89C84":"#5F5E5A"); x.style.border="0.5px solid "+(dark?"#3A352A":"#E0DACE"); }); b.style.background=(dark?"#2A2418":"#FBF3E0"); b.style.color=acc; b.style.border="1.5px solid "+acc; }; });
      document.querySelectorAll('.waterChip').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); var p=b.parentNode; p.querySelectorAll('.waterChip').forEach(function(x){ x.style.background=(dark?"#1F1C16":"#FFFFFF"); x.style.color=(dark?"#A89C84":"#5F5E5A"); x.style.border="0.5px solid "+(dark?"#3A352A":"#E0DACE"); }); b.style.background=(dark?"#161E26":"#E6F1FB"); b.style.color="#6FA8DC"; b.style.border="1.5px solid #4E86BE"; }; });
      var wst=document.getElementById('waterSuppToggleBtn'); if(wst){ wst.onclick=function(e){ e.stopPropagation(); waterIncludeSupp=!waterIncludeSupp; renderGroups(); }; }
      // 体組成：＋−ボタンで微調整、数字は直接タップ入力も可能
      document.querySelectorAll('.adjB[data-key]').forEach(function(b){
        b.onclick=function(e){ e.stopPropagation();
          var inp=document.getElementById(b.getAttribute('data-key')); if(!inp) return;
          var step=parseFloat(b.getAttribute('data-step'))||0;
          var cur=parseFloat((inp.value||'0').replace(/[^0-9.\-]/g,''))||0;
          var nv=Math.round((cur+step)*10)/10; if(nv<0) nv=0;
          inp.value=nv.toFixed(1);
        };
      });
      document.querySelectorAll('.numIn').forEach(function(inp){
        inp.onclick=function(e){ e.stopPropagation(); inp.select(); };
        inp.onblur=function(){
          var v=parseFloat((inp.value||'').replace(/[^0-9.\-]/g,''));
          if(isNaN(v)||v<0){ v=0; }
          inp.value=(Math.round(v*10)/10).toFixed(1);
        };
        inp.onkeydown=function(e){ if(e.key==='Enter'){ inp.blur(); } };
      });
    }
    var waterIncludeSupp=false;
    function waterBreakRow(t,name,ml){
      return '<div style="display:flex; align-items:center; justify-content:space-between; background:'+t.chip+'; border:0.5px solid '+t.chipBd+'; border-radius:11px; padding:9px 13px;">'+
        '<span style="font-size:12px; color:'+t.cardName+';"><i class="ti ti-droplet" style="font-size:13px; color:#6FA8DC; vertical-align:-1px; margin-right:6px;"></i>'+name+'</span>'+
        '<span style="font-size:13px; color:'+t.accent+'; font-weight:500;">'+ml+'<span style="font-size:9px; color:'+t.sub+'; font-weight:400;"> ml</span></span>'+
      '</div>';
    }
    function waterInner(t){
      var d=D[cur]||D["English"];
      var ml=1000, cups=(ml/200);
      var baseTypes=(d.waterTypes||["Warm","Water","Tea"]).slice();
      var typeList=baseTypes.slice();
      if(waterIncludeSupp) typeList.push(d.waterSuppTag||"Supplement drink");
      var types=typeList.map(function(w,i){
        var on=(i===1);
        var isSupp=(waterIncludeSupp && i===typeList.length-1);
        var onBg = isSupp ? (dark?"#1F2A1E":"#EAF6EE") : (dark?"#161E26":"#E6F1FB");
        var onCol = isSupp ? "#5DCAA5" : "#6FA8DC";
        var onBd = isSupp ? "#3E7E5E" : "#4E86BE";
        return '<span class="waterChip" style="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; '+(on?"background:"+onBg+"; color:"+onCol+"; border:1.5px solid "+onBd+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";")+'">'+w+'</span>';
      }).join("");
      return '<div style="display:flex; flex-direction:column; align-items:center; gap:3px; margin:0 0 13px;">'+
          '<div style="display:flex; align-items:center; justify-content:center; gap:14px;">'+
            '<button class="adjB" data-step="-50" style="width:32px; height:32px; border-radius:50%; background:'+t.chip+'; border:0.5px solid '+t.chipBd+'; color:'+t.sub+'; font-size:18px; cursor:pointer; line-height:1;">−</button>'+
            '<span style="font-size:22px; font-weight:600; color:'+t.accent+'; min-width:96px; text-align:center;">'+ml.toLocaleString()+'<span style="font-size:12px; color:'+t.sub+'; font-weight:400;"> ml</span></span>'+
            '<button class="adjB" data-step="50" style="width:32px; height:32px; border-radius:50%; background:'+t.chip+'; border:0.5px solid '+t.chipBd+'; color:'+t.sub+'; font-size:18px; cursor:pointer; line-height:1;">＋</button>'+
          '</div>'+
          '<span style="font-size:11px; color:'+t.sub+';">≈ '+cups+' '+(d.waterCups||"cups")+'</span>'+
        '</div>'+
        '<div style="display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin:0 0 14px;">'+types+'</div>'+
        // 種類ごとの内訳（何を何ml飲んだか）
        '<p style="font-size:11px; color:'+t.sub+'; margin:0 0 8px; font-weight:500;">'+(d.waterBreak||"By type")+'</p>'+
        '<div style="display:flex; flex-direction:column; gap:6px; margin:0 0 14px;">'+
          waterBreakRow(t,baseTypes[0],"200")+
          waterBreakRow(t,baseTypes[1],"600")+
          waterBreakRow(t,baseTypes[2],"200")+
        '</div>'+
        // サプリドリンク・トグル
        '<div style="display:flex; align-items:center; justify-content:space-between; background:'+t.chip+'; border:0.5px solid '+t.chipBd+'; border-radius:11px; padding:11px 13px;">'+
          '<span style="font-size:11px; color:'+t.sub+'; line-height:1.5; flex:1; padding-right:10px;">'+(d.waterSuppToggle||"Count supplement drinks as water")+'</span>'+
          '<button id="waterSuppToggleBtn" style="width:42px; height:24px; border-radius:999px; border:none; cursor:pointer; position:relative; background:'+(waterIncludeSupp?(dark?"#5DCAA5":"#1D9E75"):(dark?"#3A352A":"#D8D2C6"))+'; transition:background 0.25s; flex-shrink:0;"><span style="position:absolute; top:2px; left:'+(waterIncludeSupp?"20px":"2px")+'; width:20px; height:20px; border-radius:50%; background:#fff; transition:left 0.25s;"></span></button>'+
        '</div>';
    }
    function conditionInner(t){
      var d=D[cur]||D["English"];
      var bowelSel=0, moodSel=0;
      var bowel=(d.condBowelStates||["Great","Normal","Constipated","Loose"]).map(function(x,i){
        var on=(i===bowelSel);
        return '<span class="condBowelChip" data-i="'+i+'" style="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; '+(on?"background:"+(dark?"#2E1E26":"#FBEEF4")+"; color:#E89BB8; border:1.5px solid #C97AA0;":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";")+'">'+x+'</span>';
      }).join("");
      var moods=(d.condMoods||["Good","Okay","Sluggish"]).map(function(x,i){
        var on=(i===moodSel);
        return '<span class="condMoodChip" data-i="'+i+'" style="font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer; '+(on?"background:"+(dark?"#2A2418":"#FBF3E0")+"; color:"+t.accent+"; border:1.5px solid "+t.accent+";":"background:"+t.chip+"; color:"+t.chipTx+"; border:0.5px solid "+t.chipBd+";")+'">'+x+'</span>';
      }).join("");
      return '<div>'+
        // お通じ
        '<p style="font-size:12px; color:'+t.sub+'; margin:0 0 8px; font-weight:500;">'+d.condBowel+'</p>'+
        '<div style="display:flex; gap:7px; flex-wrap:wrap; margin:0 0 16px;">'+bowel+'</div>'+
        // 気分
        '<p style="font-size:12px; color:'+t.sub+'; margin:0 0 8px; font-weight:500;">'+d.condMood+'</p>'+
        '<div style="display:flex; gap:7px; flex-wrap:wrap; margin:0 0 12px;">'+moods+'</div>'+
        // 腸を繋ぐ一言
        '<p style="font-size:10px; color:'+(dark?"#7FB89E":"#4E8A72")+'; margin:0; line-height:1.6;"><i class="ti ti-seeding" style="font-size:12px; vertical-align:-1px;"></i> '+d.condGut+'</p>'+
      '</div>';
    }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr; $('lead').textContent=d.lead; $('saveBtn').textContent=d.save;
      if(d.tease){ var tz=d.tease; $('teaseTtl').textContent=tz.ttl; $('teaseSub').textContent=tz.sub; $('pv1Lbl').textContent=tz.pv1; $('pv2Lbl').textContent=tz.pv2; $('pv3Lbl').textContent=tz.pv3; $('pv3a').textContent=tz.pv3a; $('pv3b').textContent=tz.pv3b; $('unlockLbl').textContent=tz.unlock; $('unlockSub').textContent=tz.unlockSub; }
      renderGroups();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('lead').style.color=t.sub;
      $('teaseCard').style.background=t.card; $('teaseCard').style.borderColor=t.cardBd;
      $('teaseTtl').style.color=t.txt;
      $('unlockBtn').style.background=t.accent; $('unlockBtn').style.color= dark?"#16140F":"#FFFFFF";
      $('saveBtn').style.background=t.accent; $('saveBtn').style.color= dark?"#16140F":"#FFFFFF";
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      renderGroups();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyUI(); applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; applyTheme(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyUI();     (function(){
      var open=false;
      var th=document.getElementById('teaseHead');
      if(th){ th.onclick=function(){ open=!open; document.getElementById('teaseBody').style.display= open?'block':'none'; document.getElementById('teaseChev').style.transform= open?'rotate(180deg)':'rotate(0deg)'; }; }
    })();
    applyTheme();
  })();
</script>
</div>
