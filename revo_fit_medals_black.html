          }
          row.innerHTML='<i class="ti '+r.ic+'" style="font-size:19px; color:'+(isDanger?t.danger:t.iconCol)+';"></i>'+
            '<span style="flex:1; font-size:14px; color:'+(isDanger?t.danger:t.rowTx)+';">'+d.r[r.key]+'</span>'+
            '<div style="display:flex; align-items:center; gap:7px;">'+rightHtml+'</div>';
          if(r.type==="toggle"){
            row.onclick=function(e){ e.stopPropagation(); notifOn=!notifOn; renderGroups(); };
          } else if(r.type==="theme"){
            row.onclick=function(e){ e.stopPropagation(); openThemeSheet(); };
          }
          card.appendChild(row);
        });
        $('groups').appendChild(card);
      });
    }
    function themeRow(s){
      var d=D[cur]||D["English"], t=dark?T.dark:T.light;
      var on=(curTheme===s.key);
      var sw = s.swA==="conic"
        ? '<div style="width:42px; height:42px; border-radius:11px; background:conic-gradient(#D4537E,#BA7517,#1D9E75,#185FA5,#534AB7,#D4537E); flex-shrink:0;"></div>'
        : '<div style="width:42px; height:42px; border-radius:11px; overflow:hidden; display:flex; flex-shrink:0;"><div style="flex:1; background:'+s.swA+';"></div><div style="flex:1; background:'+s.swB+';"></div></div>';
      var row=document.createElement('div');
      row.style.cssText="display:flex; align-items:center; gap:13px; padding:11px 13px; border-radius:13px; cursor:pointer; background:"+(on?(dark?"#221E14":"#FBF3E0"):"transparent")+"; border:0.5px solid "+(on?t.accent:(dark?"#2A2620":"#F0EAE0"))+";";
      row.innerHTML=sw+'<div style="flex:1;"><p style="font-size:14px; color:'+t.txt+'; margin:0 0 2px; font-weight:500;">'+d.th[s.key][0]+'</p><p style="font-size:11px; color:'+t.sub+'; margin:0;">'+d.th[s.key][1]+'</p></div>'+(on?'<i class="ti ti-check" style="font-size:18px; color:'+t.accent+';"></i>':'');
      row.onclick=function(){
        curTheme=s.key;
        if(s.key==="gold"){ dark=false; } else if(s.key==="dark"){ dark=true; }
        closeThemeSheet(); applyTheme();
      };
      return row;
    }
    function renderThemeSheet(){
      var d=D[cur]||D["English"];
      $('sheetTtl').textContent=d.sheetTtl; $('sheetSub').textContent=d.sheetSub;
      $('recoLbl').textContent=d.reco; $('chooseLbl').textContent=d.choose;
      $('recoWrap').innerHTML=""; THEMES_RECO.forEach(function(s){ $('recoWrap').appendChild(themeRow(s)); });
      $('chooseWrap').innerHTML=""; THEMES_CHOOSE.forEach(function(s){ $('chooseWrap').appendChild(themeRow(s)); });
    }
    function openThemeSheet(){ renderThemeSheet(); $('themeSheet').style.display="block"; }
    function closeThemeSheet(){ $('themeSheet').style.display="none"; }
    function applyUI(){
      var d=D[cur]||D["English"];
      $('hdrTtl').textContent=d.hdr;
      renderGroups();
    }
    function applyTheme(){
      var t=dark?T.dark:T.light;
      $('screen').style.background=t.bg;
      $('hdr').style.borderColor= dark?"#2A2620":"#F0EAE0"; $('hdrTtl').style.color=t.txt;
      $('ver').style.color= dark?"#4A4438":"#C8BCA4";
      $('sheetPanel').style.background=t.sheet;
      $('sheetTtl').style.color=t.txt;
      [$('langBtn'),$('themeBtn')].forEach(function(b){ b.style.background=t.iconBg; b.style.borderColor=t.iconBd; });
      $('langBtn').querySelector('i').style.color=t.iconCol;
      $('themeIcon').className= dark? "ti ti-sun":"ti ti-moon"; $('themeIcon').style.color= dark? "#E3C56A":"#9A7B16";
      $('langMenu').style.background= dark?"#1F1C16":"#FFFFFF"; $('langMenu').style.borderColor=t.iconBd;
      if($('themeSheet').style.display==="block") renderThemeSheet();
      applyUI();
    }
    function renderMenu(){
      var titleCol= dark?"#F0EBE2":"#2E2A24", subCol="#8A7E68", acc= dark?"#E3C56A":"#BA7517";
      $('langMenu').innerHTML="";
      langs.forEach(function(l){
        var on=(l===cur);
        var row=document.createElement('div');
        row.style.cssText="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:10px; cursor:pointer;";
        row.onmouseenter=function(){ row.style.background=dark?"#26231C":"#F4EFE6"; };
        row.onmouseleave=function(){ row.style.background="transparent"; };
        row.innerHTML='<div><p style="font-size:13px; color:'+(on?acc:titleCol)+'; margin:0; font-weight:'+(on?"500":"400")+';">'+l+'</p>'+(langSub[l]?'<p style="font-size:10px; color:'+subCol+'; margin:1px 0 0;">'+langSub[l]+'</p>':'')+'</div>'+(on?'<i class="ti ti-check" style="font-size:16px; color:'+acc+';"></i>':'');
        row.onclick=function(){ cur=l; $('langMenu').style.display="none"; applyTheme(); };
        $('langMenu').appendChild(row);
      });
    }
    $('langBtn').onclick=function(e){ e.stopPropagation(); renderMenu(); var m=$('langMenu'); m.style.display=(m.style.display==="none"||!m.style.display)?"block":"none"; };
    $('themeBtn').onclick=function(){ dark=!dark; curTheme= dark?"dark":"gold"; applyTheme(); };
    $('sheetBackdrop').onclick=function(){ closeThemeSheet(); };
    document.addEventListener('click', function(){ $('langMenu').style.display="none"; });
    $('langMenu').onclick=function(e){ e.stopPropagation(); };
    applyTheme();
  })();
</script>
</div>
